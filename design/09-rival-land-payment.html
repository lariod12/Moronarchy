<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>09 Rival Land Payment</title>
    <style>
      :root { --ink:#050505; --paper:#fff; --wash:#eee; --shade:#d8d8d8; --dark:#333; }
      *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:start center;padding:18px;color:var(--ink);background:#f3f3f3;font-family:"Comic Sans MS","Trebuchet MS",Arial,sans-serif}.phone{width:min(100%,390px);background:var(--paper);border:3px solid var(--ink);box-shadow:4px 4px 0 rgba(0,0,0,.16);padding:10px;position:relative}
      .top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;min-height:34px;margin-bottom:8px}.tag,.panel,.button{background:var(--paper);border:2px solid var(--ink);font-weight:800}.tag{display:inline-grid;place-items:center;min-height:25px;padding:2px 8px;font-size:13px;transform:rotate(-1deg)}.tag.center{justify-self:center;transform:rotate(1deg)}.tag.right{justify-self:end}
      .board{position:relative;display:grid;grid-template-columns:repeat(11,1fr);grid-template-rows:repeat(11,1fr);width:100%;aspect-ratio:1;gap:6px;padding:8px;border:3px solid var(--ink)}.tile{position:relative;display:grid;place-items:center;border:2px solid var(--ink);font-size:12px;font-weight:800}.tile.dim{background:var(--shade)}.tile.dark{background:var(--dark);color:var(--paper)}.tile.target{background:var(--dark);color:var(--paper);outline:4px solid var(--ink);outline-offset:1px}.tile small{position:absolute;right:2px;bottom:1px;font-size:7px}.token{position:absolute;top:-5px;right:-5px;width:10px;height:10px;background:var(--ink);border:1px solid var(--paper);border-radius:50%}
      .center-stage{grid-column:3/10;grid-row:3/10;display:grid;place-items:center}.fee{display:grid;gap:7px;min-width:190px;padding:12px;border:3px solid var(--ink);background:var(--paper);text-align:center;transform:rotate(-1deg)}.fee b{font-size:18px}.fee strong{font-size:32px}.arrow{height:22px;position:relative}.arrow:before{content:"";position:absolute;left:25%;right:25%;top:10px;border-top:3px solid var(--ink)}.arrow:after{content:"";position:absolute;right:25%;top:4px;width:12px;height:12px;border-top:3px solid var(--ink);border-right:3px solid var(--ink);transform:rotate(45deg)}
      .hud{display:grid;grid-template-columns:112px 1fr;gap:5px;min-height:82px;margin-top:8px}.player-card{display:grid;grid-template-rows:22px 1fr}.player-name{display:grid;place-items:center;border-bottom:2px solid var(--ink);font-size:12px}.avatar{justify-self:center;align-self:center;width:42px;height:42px;background:var(--ink);border-radius:50%}.stats{display:grid;grid-template-rows:repeat(3,1fr)}.stat-row{display:grid;grid-template-columns:1fr 42px;align-items:center;border-bottom:2px solid var(--ink);font-size:12px}.stat-row:last-child{border-bottom:0}.stat-row span{padding-left:7px}.stat-row strong{display:grid;place-items:center;height:100%;border-left:2px solid var(--ink)}
      .action{margin-top:8px;padding:8px;border:3px solid var(--ink);font-size:13px;text-align:center}
    </style>
  </head>
  <body>
    <main class="phone">
      <header class="top"><span class="tag">Round 5</span><span class="tag center">R001</span><span class="tag right">Map</span></header>
      <section class="board" data-board><div class="center-stage"><div class="fee"><b>Rival land</b><strong>-28</strong><div class="arrow"></div><span>coin paid to Player 2</span></div></div></section>
      <footer class="hud"><section class="panel player-card"><div class="player-name">Player Name</div><div class="avatar"></div></section><section class="panel stats"><div class="stat-row"><span>health:</span><strong>100</strong></div><div class="stat-row"><span>coin:</span><strong>72</strong></div><div class="stat-row"><span>level:</span><strong>1</strong></div></section></footer>
      <section class="action">Payment is forced. Turn ends after fee resolves.</section>
    </main>
    <script>
      const board=document.querySelector("[data-board]");const owned=new Map([[5,"dim"],[8,"target"],[12,"dark"],[27,"dim"],[39,"dark"]]);const tokens=new Set([1,8,16,31]);
      function pos(id){if(id===1)return{c:11,r:1};if(id>=2&&id<=10)return{c:11,r:id};if(id===11)return{c:11,r:11};if(id>=12&&id<=21)return{c:22-id,r:11};if(id>=22&&id<=30)return{c:1,r:32-id};return{c:id-30,r:1};}
      for(let id=1;id<=40;id++){const p=pos(id);const tile=document.createElement("div");tile.className=`tile ${owned.get(id)??""}`;tile.style.gridColumn=p.c;tile.style.gridRow=p.r;tile.innerHTML=`<span>${String(id).padStart(2,"0")}</span>${owned.has(id)?"<small>P2</small>":""}${tokens.has(id)?'<i class="token"></i>':""}`;board.appendChild(tile);}
    </script>
  </body>
</html>
