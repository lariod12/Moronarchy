<!doctype html>
<!--
  DESIGN FRAME SPEC
  Frame: 11-defeated-bankruptcy
  Screen purpose:
    Defeated state when a king's coin reaches 0 after forced rent/payment.

  Visual design:
    Large sad face card, bankrupt message, summary stats, and one continue-watching button.

  Visible controls:
    Inputs: 0
    Buttons: 1
      1. Watch Remaining Kings - returns to waiting board state.

  Interactive features:
    - Button lets tester continue prototype as spectator.

  Button workflow:
    Watch Remaining Kings -> 04-main-board-waiting-turn.html

  Production mapping:
    Page/component target: GamePage defeated overlay/result state.
    Production should keep defeated player in spectator mode until game over.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>11 Defeated Bankruptcy</title>
    <style>
      :root { --ink:#050505; --paper:#fff; --wash:#eee; --shade:#d8d8d8; --dark:#333; }
      *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:start center;padding:18px;color:var(--ink);background:#f3f3f3;font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif}.phone{width:min(100%,390px);min-height:720px;background:var(--paper);border:3px solid var(--ink);box-shadow:4px 4px 0 rgba(0,0,0,.16);padding:10px;display:grid;grid-template-rows:auto 1fr auto;gap:12px}
      .top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;min-height:34px}.tag,.panel,.button{background:var(--paper);border:2px solid var(--ink);font-weight:800}.tag{display:inline-grid;place-items:center;min-height:25px;padding:2px 8px;font-size:13px;transform:rotate(-1deg)}.tag.center{justify-self:center;transform:rotate(1deg)}.tag.right{justify-self:end}
      .center{display:grid;place-items:center}.card{width:100%;min-height:430px;display:grid;place-items:center;gap:16px;padding:20px;border:3px solid var(--ink);background:var(--wash);text-align:center}.face{position:relative;width:118px;height:118px;background:var(--ink);border-radius:50%}.face:before,.face:after{content:"";position:absolute;top:38px;width:16px;height:16px;background:var(--paper);border-radius:50%}.face:before{left:28px}.face:after{right:28px}.mouth{position:absolute;left:36px;bottom:28px;width:46px;height:24px;border:6px solid var(--paper);border-bottom:0;border-radius:40px 40px 0 0}
      h1{margin:0;font-size:28px}.copy{font-size:14px;line-height:1.35}.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;width:100%}.stat{display:grid;place-items:center;min-height:50px;border:2px solid var(--ink);background:var(--paper);font-weight:800}.button{min-height:42px;font:inherit}
    </style>
  </head>
  <body>
    <main class="phone">
      <header class="top"><span class="tag">Defeated</span><span class="tag center">R001</span><span class="tag right">Round 9</span></header>
      <section class="center">
        <div class="card">
          <div class="face"><i class="mouth"></i></div>
          <h1>King bankrupt</h1>
          <p class="copy">Forced rent dropped coin to 0. This king is out, match continues.</p>
          <div class="stats"><div class="stat">coin 0</div><div class="stat">land 3</div><div class="stat">level 2</div></div>
        </div>
      </section>
      <button class="button" data-nav="04-main-board-waiting-turn.html">Watch Remaining Kings</button>
    </main>
    <script>
      function initializeFrame() {
        /*
          Production: this action keeps the player connected as spectator.
          Prototype: return to waiting board state.
        */
        document.querySelector("[data-nav]").addEventListener("click", (event) => {
          navigateToFrame(event.currentTarget.dataset.nav);
        });
      }

      function navigateToFrame(fileName) {
        window.location.href = fileName;
      }

      initializeFrame();
    </script>
  </body>
</html>
