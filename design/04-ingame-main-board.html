<!doctype html>
<!--
  DESIGN FRAME SPEC
  Frame: 04-ingame-main-board
  Screen purpose:
    In-game main board while the local prototype simulates two kings taking turns.

  Visual design:
    Black/white hand-drawn mobile wireframe matching the in-game board reference:
    top tags, 40-tile perimeter board, dice callout in the empty center, and a bottom player HUD.

  Visible controls:
    Inputs: 0
    Buttons: 4
      1. Map - future map overview shortcut.
      2. Tap to Scroll - shakes the dice, randomizes pips, moves the active player, and resolves the tile action.
      3. Back - returns to 02-room-lobby.html.
      4. Crown button - opens a local status popup.

  Interactive features:
    - Tap to Scroll hides speech text, shakes the dice, randomizes pip faces, moves the active player, then reveals the final number.
    - Two local prototype players alternate turns after each completed roll.
    - Empty land opens the buy/skip modal in this same frame instead of navigating to a separate design.
    - Rival land resolves a fee locally and returns to the next active turn in this same frame.
    - Crown button opens/closes a player status modal.
    - Map button is visible as a future production control.

  Button workflow:
    Map -> local no-op for this frame.
    Tap to Scroll -> dice shake -> random pip changes -> active player moves -> optional land action -> turn advances to next player.
    Back -> 02-room-lobby.html.
    Crown -> open status popup; Close -> hide popup.

  Production mapping:
    Page/component target: GamePage, BoardFrame, PlayerHud, and StatusMenu.
    Waiting/turn state should come from boardgame.io currentPlayer, not local JS.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>04 In Game Main Board</title>
    <style>
      :root {
        --ink: #050505;
        --paper: #ffffff;
        --wash: #f4f4f4;
        --shade: #cfcfcf;
        --stroke: 3px;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      button,
      input {
        font: inherit;
      }

      button {
        color: var(--ink);
        appearance: none;
        -webkit-appearance: none;
        -webkit-text-fill-color: currentColor;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: start center;
        padding: 10px;
        overflow: hidden;
        color: var(--ink);
        background: #f3f3f3;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        -webkit-touch-callout: none;
      }

      /* Root mobile frame. Production equivalent: GamePage shell. */
      .phone {
        position: relative;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 8px;
        width: min(100%, 430px);
        min-height: calc(100vh - 20px);
        margin: 0 auto;
        background: var(--paper);
        border: var(--stroke) solid var(--ink);
        box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.16);
        padding: 12px;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        -webkit-touch-callout: none;
      }

      .phone,
      .phone * {
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        -webkit-touch-callout: none;
      }

      .frame-top {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: start;
        min-height: 42px;
        margin-bottom: -1px;
      }

      .tag,
      .map-button,
      .tile,
      .panel,
      .tap-scroll,
      .modal-card button {
        background: var(--paper);
        border: var(--stroke) solid var(--ink);
        font-weight: 850;
        line-height: 1;
      }

      .tag,
      .map-button {
        width: max-content;
        min-height: 30px;
        padding: 5px 8px;
        font-size: 15px;
        transform: rotate(-1deg);
      }

      .tag {
        justify-self: start;
      }

      .tag.center {
        justify-self: center;
        transform: rotate(1deg);
      }

      .map-button {
        justify-self: end;
        min-width: 44px;
        cursor: pointer;
        transform: rotate(2deg);
      }

      .map-button:active,
      .tap-scroll:active {
        transform: translateY(1px);
      }

      /* Board perimeter: 40 Monopoly-style tiles wrapped around an empty play field. */
      .board {
        position: relative;
        display: grid;
        grid-template-columns: repeat(11, 1fr);
        grid-template-rows: repeat(11, 1fr);
        width: 100%;
        aspect-ratio: 1 / 1;
        height: auto;
        justify-self: stretch;
        align-self: center;
        min-height: 0;
        gap: 7px;
        padding: 8px;
        border: var(--stroke) solid var(--ink);
        background: var(--paper);
      }

      .tile {
        position: relative;
        display: grid;
        place-items: center;
        min-width: 0;
        min-height: 0;
        font-size: clamp(11px, 3.1vw, 15px);
        border-width: 2.5px;
        box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.2);
      }

      .tile.is-owned {
        background: #d0d0d0;
      }

      .tile.is-tilted-left {
        transform: rotate(-1.5deg);
      }

      .tile.is-tilted-right {
        transform: rotate(1.5deg);
      }

      .tile.has-marker {
        z-index: 3;
      }

      .tile.has-active-marker {
        z-index: 8;
      }

      .king-token {
        position: absolute;
        left: var(--token-x, 50%);
        top: var(--token-y, 50%);
        z-index: 10;
        display: block;
        width: 22px;
        height: 28px;
        isolation: isolate;
        pointer-events: none;
        transform: translate(-50%, -50%) scale(0.9);
      }

      .turn-token-callout {
        position: absolute;
        left: 50%;
        bottom: 29px;
        z-index: 11;
        display: grid;
        justify-items: center;
        pointer-events: none;
        transform: translateX(-50%);
        transform-origin: center bottom;
        animation: turn-token-callout-bob 1.05s ease-in-out infinite;
      }

      .turn-token-caret {
        width: 0;
        height: 0;
        margin-top: 0;
        border-right: 8px solid transparent;
        border-left: 8px solid transparent;
        border-top: 11px solid var(--ink);
        filter: drop-shadow(1px 1px 0 rgba(0, 0, 0, 0.18));
      }

      @keyframes turn-token-callout-bob {
        0%,
        100% {
          transform: translateX(-50%) translateY(0) scale(1);
        }

        50% {
          transform: translateX(-50%) translateY(-3px) scale(1.04);
        }
      }

      .tile-marker {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 22px;
        height: 28px;
        transform: translate(-50%, -50%);
        z-index: 2;
      }

      .tile-marker-image {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .board-center {
        grid-column: 3 / 10;
        grid-row: 3 / 10;
        position: relative;
        display: grid;
        place-items: center;
      }

      .dice-callout {
        position: relative;
        display: grid;
        justify-items: center;
        gap: 9px;
        margin-top: clamp(82px, 18dvh, 144px);
        transform: rotate(-1deg);
      }

      .speech-bubble {
        position: absolute;
        left: 53px;
        top: -34px;
        z-index: 3;
        width: 58px;
        height: 32px;
        display: grid;
        place-items: center;
        padding: 4px 11px;
        overflow: visible;
        background: var(--paper);
        border: 2px solid var(--ink);
        border-radius: 999px;
        font-size: 14px;
        font-weight: 900;
        line-height: 1.1;
        text-align: center;
        /* transform: rotate(-12deg); */
      }

      .speech-text {
        display: block;
        max-width: 38px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .speech-bubble[hidden] {
        display: none;
      }

      /*
        Design decision:
        This bubble reuses the approved speech bubble construction from 02-room-lobby.
        Tail uses a black outer layer and white inner layer so it stays connected
        to the bubble body. Do not switch back to a rotated border tail.
      */
      .speech-bubble::before {
        content: "";
        position: absolute;
        left: 6px;
        bottom: -14px;
        width: 18px;
        height: 15px;
        background: var(--ink);
        clip-path: polygon(20% 0, 96% 0, 27% 70%);
      }

      .speech-bubble::after {
        content: "";
        position: absolute;
        left: 9px;
        bottom: -6px;
        width: 14px;
        height: 10px;
        background: var(--paper);
        clip-path: polygon(0 0, 100% 0, 34% 100%);
      }

      .dice {
        width: 48px;
        height: 48px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 4px;
        padding: 7px;
        background: var(--ink);
        border: 2px solid var(--ink);
        border-radius: 4px;
      }

      .dice.is-shaking {
        animation: dice-shake 200ms ease-in-out infinite;
      }

      .pip {
        width: 7px;
        height: 7px;
        place-self: center;
        background: var(--paper);
        border-radius: 50%;
      }

      .pip--top-left {
        grid-column: 1;
        grid-row: 1;
      }

      .pip--top-right {
        grid-column: 3;
        grid-row: 1;
      }

      .pip--middle-left {
        grid-column: 1;
        grid-row: 2;
      }

      .pip--center {
        grid-column: 2;
        grid-row: 2;
      }

      .pip--middle-right {
        grid-column: 3;
        grid-row: 2;
      }

      .pip--bottom-left {
        grid-column: 1;
        grid-row: 3;
      }

      .pip--bottom-right {
        grid-column: 3;
        grid-row: 3;
      }

      @keyframes dice-shake {
        0% {
          transform: translate(0, 0) rotate(0deg);
        }

        20% {
          transform: translate(-3px, 1px) rotate(-6deg);
        }

        40% {
          transform: translate(3px, -1px) rotate(5deg);
        }

        60% {
          transform: translate(-2px, -1px) rotate(-4deg);
        }

        80% {
          transform: translate(2px, 1px) rotate(4deg);
        }

        100% {
          transform: translate(0, 0) rotate(0deg);
        }
      }

      .tap-scroll {
        min-width: 86px;
        min-height: 28px;
        padding: 5px 8px;
        cursor: pointer;
        font-size: 12px;
        transform: rotate(-1.5deg);
      }

      /* Bottom HUD: player identity, stats, back, and king menu. */
      .hud {
        display: grid;
        grid-template-columns: 1.45fr 0.8fr 1fr 1fr;
        gap: 6px;
        min-height: 88px;
        align-self: end;
      }

      .panel {
        min-width: 0;
        border-width: var(--stroke);
      }

      .player-card {
        position: relative;
        display: grid;
        grid-template-rows: 1fr;
        min-width: 0;
        overflow: visible;
        background: var(--paper);
        padding-top: 14px;
      }

      .player-name {
        position: absolute;
        left: 5px;
        top: 0px;
        z-index: 2;
        width: max-content;
        display: grid;
        place-items: center;
        min-height: 22px;
        padding: 1px 7px 2px;
        background: var(--paper);
        border: 2.5px solid var(--ink);
        box-shadow: 2px 2px 0 var(--ink);
        font-size: 12px;
        font-weight: 850;
        line-height: 1;
        white-space: nowrap;
        transform: rotate(-1deg);
      }

      .avatar {
        position: relative;
        display: block;
        overflow: hidden;
        min-height: 0;
        background: var(--paper);
      }

      .avatar-icon {
        position: absolute;
        inset: 0;
      }

      .avatar-head {
        position: absolute;
        left: 50%;
        bottom: 25px;
        width: 30px;
        aspect-ratio: 1 / 1;
        background: var(--ink);
        border-radius: 999px;
        transform: translateX(-50%);
      }

      .avatar-body {
        position: absolute;
        left: 50%;
        bottom: -4px;
        width: 60px;
        height: 26px;
        background: var(--ink);
        border-radius: 999px 999px 0 0;
        transform: translateX(-50%);
      }

      .stats {
        display: grid;
        align-content: stretch;
        gap: 3px;
        border: 0;
      }

      .stat-row {
        display: grid;
        align-items: center;
        min-height: 25px;
        padding: 2px 6px;
        background: var(--paper);
        border: 2.5px solid var(--ink);
        font-size: 12px;
        font-weight: 850;
        line-height: 1;
        white-space: nowrap;
      }

      .stat-row.is-turn {
        background: var(--shade);
      }

      .nav-button,
      .crown-button {
        min-width: 0;
        display: grid;
        place-items: center;
        min-height: 78px;
        padding: 0;
        border-width: 2.5px;
        box-shadow: 3px 3px 0 var(--ink);
        cursor: pointer;
        overflow: hidden;
        transition: transform 80ms ease, box-shadow 80ms ease;
      }

      .nav-button:active,
      .crown-button:active,
      .nav-button.is-pressed,
      .crown-button.is-pressed {
        transform: translate(3px, 3px);
        box-shadow: 0 0 0 var(--ink);
      }

      .back-disc {
        position: relative;
        width: 54px;
        height: 54px;
        display: block;
        background: var(--ink);
        border-radius: 50%;
      }

      .back-disc::before {
        content: "";
        position: absolute;
        left: 13px;
        top: 18px;
        width: 26px;
        height: 14px;
        background: var(--paper);
        clip-path: polygon(0 50%, 42% 0, 42% 28%, 100% 28%, 100% 72%, 42% 72%, 42% 100%);
      }

      .crown {
        position: relative;
        display: block;
        width: 58px;
        height: 45px;
      }

      .crown::before {
        content: "";
        position: absolute;
        left: 3px;
        right: 3px;
        bottom: 2px;
        height: 34px;
        background: var(--ink);
        clip-path: polygon(7% 100%, 0 28%, 30% 58%, 50% 0, 70% 58%, 100% 28%, 93% 100%);
        border-radius: 0 0 9px 9px;
      }

      .crown::after {
        content: "";
        position: absolute;
        left: 0;
        top: 12px;
        width: 12px;
        height: 12px;
        background: var(--ink);
        border-radius: 50%;
        box-shadow: 23px -11px 0 var(--ink), 46px 0 0 var(--ink);
      }

      .modal[hidden] {
        display: none;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.42);
      }

      .modal-card {
        display: grid;
        gap: 10px;
        width: min(100%, 280px);
        padding: 16px;
        background: var(--paper);
        border: var(--stroke) solid var(--ink);
        text-align: center;
      }

      .modal-card button,
      .land-purchase-dialog button,
      .land-ledger-close {
        min-height: 42px;
        cursor: pointer;
      }

      .tile-owner,
      .tile-level {
        position: absolute;
        font-size: 8px;
        font-weight: 900;
        line-height: 1;
      }

      .tile-owner {
        left: 3px;
        bottom: 2px;
      }

      .tile-level {
        right: 3px;
        bottom: 2px;
      }

      .land-purchase-modal {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.38);
      }

      .land-purchase-modal[hidden] {
        display: none;
      }

      .land-purchase-dialog {
        display: grid;
        gap: 14px;
        width: min(100%, 320px);
        padding: 16px;
        background: var(--paper);
        border: var(--stroke) solid var(--ink);
        transform: rotate(-1deg);
      }

      .land-purchase-copy {
        display: grid;
        gap: 8px;
        text-align: center;
      }

      .land-purchase-kicker {
        justify-self: center;
        width: max-content;
        padding: 3px 8px;
        background: var(--shade);
        border: 2px solid var(--ink);
        font-size: 12px;
        font-weight: 900;
      }

      .land-purchase-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .land-purchase-actions button,
      .land-ledger-close {
        background: var(--paper);
        border: var(--stroke) solid var(--ink);
        font-weight: 900;
      }

      .land-purchase-actions .primary-action {
        background: var(--shade);
      }

      .land-purchase-actions button:disabled {
        color: #777;
        background: #e7e7e7;
      }

      .land-ledger-modal[hidden] {
        display: none;
      }

      .land-ledger-modal {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 10px;
        padding: 12px;
        background: var(--paper);
      }

      .land-ledger-header {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: start;
      }

      .land-ledger-header .tag:last-child {
        justify-self: end;
      }

      .land-ledger-table {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        overflow: hidden;
        border: 2.5px solid var(--ink);
      }

      .land-ledger-body {
        min-height: 0;
        overflow-y: auto;
      }

      .land-ledger-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1.25fr 1.15fr;
        align-items: center;
        min-height: 42px;
        padding: 0 10px;
        border-bottom: 2px solid var(--ink);
        font-size: 12px;
        font-weight: 850;
      }

      .land-ledger-row-head {
        min-height: 36px;
        background: var(--shade);
        font-weight: 950;
      }

      .land-ledger-row.is-owned-self {
        background: #bfbfbf;
        box-shadow: inset 5px 0 0 var(--ink);
      }

      .land-ledger-row span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .land-ledger-close {
        justify-self: end;
        min-height: 44px;
        padding: 0 14px;
        transform: rotate(1deg);
      }

      @media (max-width: 430px) {
        body {
          padding: 0;
          background: var(--paper);
        }

        .phone {
          width: 100%;
          min-height: 100dvh;
          border-inline: 0;
          box-shadow: none;
          padding: 8px;
        }
      }

      @media (max-width: 380px) {
        .phone {
          padding: 8px;
        }

        .board {
          gap: 5px;
          padding: 6px;
        }

        .hud {
          grid-template-columns: 1.28fr 0.8fr 0.9fr 0.9fr;
          gap: 5px;
        }

        .tag,
        .map-button {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <main class="phone screen-ingame-main-board" aria-label="In-game main board frame">
      <header class="frame-top">
        <span class="tag" data-bind="round-label">Round 1</span>
        <span class="tag center" data-bind="turn-label">P1 Turn</span>
        <button class="map-button" type="button" data-action="open-map" aria-label="Open map overview">Map</button>
      </header>

      <section class="board" data-board aria-label="40 tile game board">
        <div class="board-center">
          <div class="dice-callout" aria-label="Dice result preview">
            <div class="speech-bubble" hidden aria-live="polite">
              <span class="speech-text" data-bind="roll-result">11</span>
            </div>
            <div class="dice" data-dice-face="5" aria-hidden="true">
              <span class="pip pip--top-left"></span>
              <span class="pip pip--top-right"></span>
              <span class="pip pip--center"></span>
              <span class="pip pip--bottom-left"></span>
              <span class="pip pip--bottom-right"></span>
            </div>
            <button class="tap-scroll" type="button" data-action="simulate-main-board-turn">Tap to Scroll</button>
          </div>
        </div>
      </section>

      <footer class="hud" aria-label="Player heads up display">
        <section class="panel player-card" aria-label="Current player">
          <div class="player-name" data-bind="player-name">Player 1</div>
          <div class="avatar" aria-hidden="true">
            <div class="avatar-icon" aria-hidden="true">
              <div class="avatar-head"></div>
              <div class="avatar-body"></div>
            </div>
          </div>
        </section>

        <section class="stats" aria-label="Player stats">
          <div class="stat-row" data-bind="player-health">health: 100</div>
          <div class="stat-row" data-bind="player-coin">coin: 100</div>
          <div class="stat-row is-turn" data-bind="player-turn">turn: Player 1</div>
        </section>

        <button class="panel nav-button" type="button" data-nav="02-room-lobby.html" aria-label="Back to room lobby">
          <span class="back-disc" aria-hidden="true"></span>
        </button>

        <button class="panel crown-button" type="button" data-modal-open="land-ledger-modal" aria-label="Open king status">
          <span class="crown" aria-hidden="true"></span>
        </button>
      </footer>

      <section class="land-purchase-modal" data-modal="land-purchase-modal" hidden>
        <div class="land-purchase-dialog" role="dialog" aria-modal="true" aria-labelledby="land-purchase-title">
          <div class="land-purchase-copy">
            <span class="land-purchase-kicker" data-bind="land-purchase-kicker">Tile 04</span>
            <strong id="land-purchase-title">Buy this land?</strong>
            <span data-bind="land-purchase-price">Price: 50 coin</span>
          </div>
          <div class="land-purchase-actions">
            <button type="button" data-action="skip-tile-action">Skip</button>
            <button type="button" class="primary-action" data-action="buy-land">Buy</button>
          </div>
        </div>
      </section>

      <section class="land-ledger-modal" data-modal="land-ledger-modal" hidden>
        <header class="land-ledger-header">
          <span class="tag" data-bind="ledger-round-label">Round 1</span>
          <strong class="tag center">Land</strong>
          <span class="tag" data-bind="ledger-player-name">Player 1</span>
        </header>

        <section class="land-ledger-table" aria-label="Land ownership and levels">
          <div class="land-ledger-row land-ledger-row-head">
            <span>Name</span>
            <span>Level</span>
            <span>Plots</span>
            <span>Plots LV</span>
          </div>
          <div class="land-ledger-body" data-bind="land-ledger-body"></div>
        </section>

        <button class="land-ledger-close" type="button" data-modal-close="land-ledger-modal">Close</button>
      </section>

      <section class="modal" data-modal="king-status-modal" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="king-status-title">
          <strong id="king-status-title">King Status</strong>
          <span data-bind="status-summary">Player 1: Health 200 / Coin 200 / Tile 04</span>
          <button type="button" data-modal-close="king-status-modal">Close</button>
        </div>
      </section>
    </main>

    <script>
      const boardSize = 40;
      const startBonus = 50;
      const maxKingLevel = 3;
      const landEconomyBySegment = [
        { price: 50, rents: [10, 20, 35], upgradeCosts: [40, 60] },
        { price: 70, rents: [14, 28, 49], upgradeCosts: [56, 84] },
        { price: 90, rents: [18, 36, 63], upgradeCosts: [72, 108] },
        { price: 110, rents: [22, 44, 77], upgradeCosts: [88, 132] }
      ];

      const frameState = {
        tiles: createInitialTiles(),
        players: [
          { id: 1, name: "Player 1", health: 100, coin: 200, level: 1, tile: 4 },
          { id: 2, name: "Player 2", health: 100, coin: 200, level: 1, tile: 22 }
        ],
        activePlayerIndex: 0,
        round: 1,
        phase: "rolling",
        pendingTileId: null,
        isRolling: false,
        currentFace: 5
      };

      const frameElements = {
        board: document.querySelector("[data-board]"),
        mapButton: document.querySelector("[data-action='open-map']"),
        waitButton: document.querySelector("[data-action='simulate-main-board-turn']"),
        dice: document.querySelector("[data-dice-face]"),
        speechBubble: document.querySelector(".speech-bubble"),
        speechText: document.querySelector("[data-bind='roll-result']"),
        roundLabel: document.querySelector("[data-bind='round-label']"),
        turnLabel: document.querySelector("[data-bind='turn-label']"),
        playerName: document.querySelector("[data-bind='player-name']"),
        playerHealth: document.querySelector("[data-bind='player-health']"),
        playerCoin: document.querySelector("[data-bind='player-coin']"),
        playerTurn: document.querySelector("[data-bind='player-turn']"),
        statusSummary: document.querySelector("[data-bind='status-summary']"),
        landPurchaseKicker: document.querySelector("[data-bind='land-purchase-kicker']"),
        landPurchasePrice: document.querySelector("[data-bind='land-purchase-price']"),
        ledgerRoundLabel: document.querySelector("[data-bind='ledger-round-label']"),
        ledgerPlayerName: document.querySelector("[data-bind='ledger-player-name']"),
        landLedgerBody: document.querySelector("[data-bind='land-ledger-body']"),
        buyLandButton: document.querySelector("[data-action='buy-land']"),
        skipTileActionButton: document.querySelector("[data-action='skip-tile-action']"),
        backButton: document.querySelector("[data-nav='02-room-lobby.html']"),
        openStatusButton: document.querySelector("[data-modal-open='land-ledger-modal']")
      };

      const diceFaces = {
        1: ["center"],
        2: ["top-left", "bottom-right"],
        3: ["top-left", "center", "bottom-right"],
        4: ["top-left", "top-right", "bottom-left", "bottom-right"],
        5: ["top-left", "top-right", "center", "bottom-left", "bottom-right"],
        6: ["top-left", "top-right", "middle-left", "middle-right", "bottom-left", "bottom-right"]
      };

      function initializeFrame() {
        /*
          Production:
          - waiting state comes from boardgame.io currentPlayer
          - Tap to Scroll is a prototype shortcut for frame review only
        */
        renderBoard();
        renderDiceFace(frameState.currentFace);
        renderHud();
        hideSpeechResult();
        frameElements.mapButton.addEventListener("click", handleOpenMap);
        frameElements.waitButton.addEventListener("click", handleSimulateMainBoardTurn);
        frameElements.buyLandButton.addEventListener("click", handleBuyLand);
        frameElements.skipTileActionButton.addEventListener("click", handleSkipTileAction);
        frameElements.backButton.addEventListener("click", () => navigateToFrame("02-room-lobby.html"));
        frameElements.openStatusButton.addEventListener("click", () => {
          renderLandLedger();
          openModal("land-ledger-modal");
        });
        document.querySelectorAll("[data-modal-close]").forEach((button) => {
          button.addEventListener("click", () => closeModal(button.dataset.modalClose));
        });
        bindPressEffect(frameElements.backButton);
        bindPressEffect(frameElements.openStatusButton);
      }

      function bindPressEffect(button) {
        const press = () => button.classList.add("is-pressed");
        const release = () => button.classList.remove("is-pressed");

        button.addEventListener("pointerdown", press);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointerleave", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("touchstart", press, { passive: true });
        button.addEventListener("touchend", release);
        button.addEventListener("touchcancel", release);
        button.addEventListener("blur", release);
      }

      function createInitialTiles() {
        return Array.from({ length: boardSize }, (_, index) => ({
          id: index + 1,
          type: index === 0 ? "start" : "land",
          ownerId: null,
          landLevel: 0
        }));
      }

      function getTile(tileId) {
        return frameState.tiles[tileId - 1];
      }

      function getLandEconomy(tileId) {
        if (tileId <= 1 || tileId > boardSize) return null;
        if (tileId <= 10) return landEconomyBySegment[0];
        if (tileId <= 20) return landEconomyBySegment[1];
        if (tileId <= 30) return landEconomyBySegment[2];
        return landEconomyBySegment[3];
      }

      function getRentForTile(tile) {
        const economy = getLandEconomy(tile.id);
        if (!economy || tile.landLevel < 1) return 0;
        return economy.rents[tile.landLevel - 1] ?? 0;
      }

      function renderBoard() {
        frameElements.board.querySelectorAll(".tile").forEach((tile) => tile.remove());

        for (let id = 1; id <= 40; id += 1) {
          const position = getTileGridPosition(id);
          const tileState = getTile(id);
          const playersOnTile = frameState.players.filter((player) => player.tile === id);
          const hasActivePlayer = playersOnTile.some((player) => player.id === getActivePlayer().id);
          const tile = document.createElement("div");
          const tiltClass = id % 2 === 0 ? "is-tilted-right" : "is-tilted-left";
          tile.className = [
            "tile",
            tiltClass,
            tileState.ownerId !== null ? "is-owned" : "",
            playersOnTile.length > 0 ? "has-marker" : "",
            hasActivePlayer ? "has-active-marker" : ""
          ].filter(Boolean).join(" ");
          tile.style.gridColumn = position.column;
          tile.style.gridRow = position.row;
          tile.setAttribute("aria-label", `Tile ${id}`);

          if (playersOnTile.length === 0) {
            tile.append(String(id).padStart(2, "0"));
          } else {
            playersOnTile.forEach((player, index) => {
              tile.appendChild(createKingToken(player, playersOnTile.length, index));
            });
          }

          renderTileOwnership(tile, tileState);
          frameElements.board.appendChild(tile);
        }
      }

      function renderTileOwnership(tileElement, tileState) {
        if (tileState.ownerId === null) return;

        const owner = document.createElement("span");
        owner.className = "tile-owner";
        owner.textContent = `P${tileState.ownerId}`;
        tileElement.appendChild(owner);

        const level = document.createElement("span");
        level.className = "tile-level";
        level.textContent = `L${tileState.landLevel}`;
        tileElement.appendChild(level);
      }

      function createKingToken(player, playerCountOnTile, playerIndex) {
        const token = document.createElement("span");
        const isActive = player.id === getActivePlayer().id;
        const offset = playerCountOnTile < 2 ? 0 : playerIndex === 0 ? -11 : 11;
        token.className = "king-token";
        token.title = player.name;
        token.style.setProperty("--token-x", `calc(50% + ${offset}px)`);
        token.style.setProperty("--token-y", "50%");

        if (isActive) {
          const callout = document.createElement("span");
          callout.className = "turn-token-callout";
          callout.setAttribute("aria-hidden", "true");

          const caret = document.createElement("span");
          caret.className = "turn-token-caret";
          callout.appendChild(caret);
          token.appendChild(callout);
        }

        const marker = document.createElement("span");
        marker.className = "tile-marker";
        marker.setAttribute("role", "img");
        marker.setAttribute("aria-label", `${player.name} marker`);

        const image = document.createElement("img");
        image.className = "tile-marker-image";
        image.src = "../apps/web/src/assets/icons/residents-icon.svg";
        image.alt = "";
        image.setAttribute("aria-hidden", "true");
        marker.appendChild(image);

        token.appendChild(marker);
        return token;
      }

      function renderHud() {
        const activePlayer = getActivePlayer();
        frameElements.roundLabel.textContent = `Round ${frameState.round}`;
        frameElements.turnLabel.textContent = `P${activePlayer.id} Turn`;
        frameElements.playerName.textContent = activePlayer.name;
        frameElements.playerHealth.textContent = `health: ${activePlayer.health}`;
        frameElements.playerCoin.textContent = `coin: ${activePlayer.coin}`;
        frameElements.playerTurn.textContent = `level: ${activePlayer.level}`;
        frameElements.statusSummary.textContent =
          `${activePlayer.name}: Health ${activePlayer.health} / Coin ${activePlayer.coin} / Level ${activePlayer.level} / Tile ${String(activePlayer.tile).padStart(2, "0")}`;
        frameElements.waitButton.textContent = `P${activePlayer.id} Tap to Scroll`;
      }

      function getActivePlayer() {
        return frameState.players[frameState.activePlayerIndex];
      }

      function renderLandLedger() {
        const activePlayer = getActivePlayer();
        frameElements.ledgerRoundLabel.textContent = `Round ${frameState.round}`;
        frameElements.ledgerPlayerName.textContent = activePlayer.name;
        frameElements.landLedgerBody.replaceChildren(
          ...frameState.tiles
            .filter((tile) => tile.type === "land")
            .map((tile) => {
              const owner = tile.ownerId !== null
                ? frameState.players.find((player) => player.id === tile.ownerId)
                : null;
              const isOwnedByPlayer = tile.ownerId === activePlayer.id;
              const row = document.createElement("div");
              row.className = `land-ledger-row ${isOwnedByPlayer ? "is-owned-self" : ""}`;

              [
                String(tile.id).padStart(2, "0"),
                String(tile.landLevel),
                isOwnedByPlayer ? "Mine" : owner ? `P${owner.id}` : "-",
                isOwnedByPlayer ? String(tile.landLevel) : "-"
              ].forEach((value) => {
                const cell = document.createElement("span");
                cell.textContent = value;
                row.appendChild(cell);
              });

              return row;
            })
        );
      }

      function getTileGridPosition(id) {
        /*
          Production equivalent: tile-layout helper maps 40 Monopoly-style tiles
          onto an 11x11 perimeter grid.
        */
        if (id === 1) return { column: 11, row: 1 };
        if (id >= 2 && id <= 10) return { column: 11, row: id };
        if (id === 11) return { column: 11, row: 11 };
        if (id >= 12 && id <= 21) return { column: 22 - id, row: 11 };
        if (id >= 22 && id <= 30) return { column: 1, row: 32 - id };
        return { column: id - 30, row: 1 };
      }

      function handleOpenMap() {
        /*
          Production action:
          - open map overview panel
          - this frame keeps it as a no-op because the screenshot only defines the visible control
        */
      }

      function handleSimulateMainBoardTurn() {
        if (frameState.isRolling) return;

        /*
          Prototype action:
          - hide the speech result while dice is moving
          - rapidly swap pip patterns to show random rolling
          - reveal the final number in the speech bubble after the shake stops
          Production should replace this with the real dice/move result.
        */
        frameState.isRolling = true;
        frameElements.waitButton.disabled = true;
        frameElements.waitButton.textContent = "Rolling...";
        hideSpeechResult();

        frameElements.dice.classList.remove("is-shaking");
        void frameElements.dice.offsetWidth;
        frameElements.dice.classList.add("is-shaking");

        let ticks = 0;
        const maxTicks = 14;
        const rollTimer = window.setInterval(() => {
          ticks += 1;
          renderDiceFace(getRandomDiceFace());

          if (ticks >= maxTicks) {
            window.clearInterval(rollTimer);
            const finalFace = getRandomDiceFace();
            const rollingPlayer = getActivePlayer();
            frameState.currentFace = finalFace;
            const movement = movePlayer(rollingPlayer, finalFace);
            renderDiceFace(finalFace);
            showSpeechResult(finalFace);
            resolvePostMoveAction(rollingPlayer, movement);
            renderBoard();
            renderHud();
            frameElements.dice.classList.remove("is-shaking");
            frameState.isRolling = false;
          }
        }, 140);
      }

      function movePlayer(player, steps) {
        const nextTile = ((player.tile - 1 + steps) % 40) + 1;
        const passedStart = nextTile < player.tile;
        if (nextTile < player.tile) {
          player.coin += startBonus;
          player.level = Math.min(maxKingLevel, player.level + 1);
        }
        player.tile = nextTile;
        return { to: nextTile, passedStart };
      }

      function resolvePostMoveAction(player, movement) {
        const tile = getTile(movement.to);
        if (!tile || tile.type !== "land") {
          endTurn();
          return;
        }

        if (tile.ownerId === null) {
          openLandPurchase(tile, player);
          return;
        }

        if (tile.ownerId !== player.id && tile.landLevel > 0) {
          resolveRivalLandFee(player, tile);
        }

        endTurn();
      }

      function openLandPurchase(tile, player) {
        const economy = getLandEconomy(tile.id);
        frameState.phase = "tile-action";
        frameState.pendingTileId = tile.id;
        frameElements.landPurchaseKicker.textContent = `Tile ${String(tile.id).padStart(2, "0")}`;
        frameElements.landPurchasePrice.textContent = `Price: ${economy.price} coin`;
        frameElements.buyLandButton.disabled = player.coin - economy.price < 1;
        frameElements.waitButton.disabled = true;
        openModal("land-purchase-modal");
      }

      function handleBuyLand() {
        if (frameState.phase !== "tile-action" || frameState.pendingTileId === null) return;

        const player = getActivePlayer();
        const tile = getTile(frameState.pendingTileId);
        if (!tile) return;

        const economy = getLandEconomy(tile.id);
        if (!tile || tile.ownerId !== null || !economy || player.coin - economy.price < 1) return;

        player.coin -= economy.price;
        tile.ownerId = player.id;
        tile.landLevel = 1;
        finishTileAction();
      }

      function handleSkipTileAction() {
        if (frameState.phase !== "tile-action") return;
        finishTileAction();
      }

      function finishTileAction() {
        closeModal("land-purchase-modal");
        frameState.phase = "rolling";
        frameState.pendingTileId = null;
        endTurn();
        renderBoard();
        renderHud();
      }

      function resolveRivalLandFee(player, tile) {
        const owner = frameState.players.find((item) => item.id === tile.ownerId);
        const rent = getRentForTile(tile);
        if (!owner || rent <= 0) return;

        const paid = Math.min(player.coin, rent);
        player.coin = Math.max(0, player.coin - rent);
        owner.coin += paid;
      }

      function endTurn() {
        frameElements.waitButton.disabled = false;
        frameState.phase = "rolling";
        frameState.activePlayerIndex = (frameState.activePlayerIndex + 1) % frameState.players.length;
        if (frameState.activePlayerIndex === 0) {
          frameState.round += 1;
        }
      }

      function getRandomDiceFace() {
        return Math.floor(Math.random() * 6) + 1;
      }

      function renderDiceFace(face) {
        frameElements.dice.dataset.diceFace = String(face);
        frameElements.dice.replaceChildren(
          ...diceFaces[face].map((position) => {
            const pip = document.createElement("span");
            pip.className = `pip pip--${position}`;
            return pip;
          })
        );
      }

      function hideSpeechResult() {
        frameElements.speechBubble.hidden = true;
        frameElements.speechBubble.setAttribute("aria-hidden", "true");
      }

      function showSpeechResult(face) {
        frameElements.speechText.textContent = String(face);
        frameElements.speechBubble.hidden = false;
        frameElements.speechBubble.setAttribute("aria-hidden", "false");
      }

      function navigateToFrame(fileName) {
        window.location.href = fileName;
      }

      function openModal(id) {
        const modal = document.querySelector(`[data-modal='${id}']`);
        if (modal) modal.hidden = false;
      }

      function closeModal(id) {
        const modal = document.querySelector(`[data-modal='${id}']`);
        if (modal) modal.hidden = true;
      }

      initializeFrame();
    </script>
  </body>
</html>
