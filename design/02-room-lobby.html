<!doctype html>
<!--
  DESIGN FRAME SPEC
  Frame: 02-room-lobby
  Screen purpose:
    Waiting room after Create or Join. Shows room code, player slots, ready/waiting states, and starts match.

  Visual design:
    Black/white room card with four player slots. No annotation text is rendered.

  Visible controls:
    Inputs: 0
    Buttons: 2
      1. Back - returns to 01-welcome-create-join.html.
      2. Start Game - navigates to 03-game-starting.html when enough players are present.

  Interactive features:
    - Reads optional query params from frame 01: player, room, flow.
    - Displays player name in Player 1 slot when present.
    - Start Game advances to the countdown frame.

  Button workflow:
    Back -> 01-welcome-create-join.html
    Start Game -> 03-game-starting.html

  Production mapping:
    Page/component target: apps/web RoomPage.
    Start action maps to room host starting a boardgame.io match.
    Fake local lobby slots should be replaced by server match/room state.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>02 Room Lobby</title>
    <style>
      :root { --ink:#050505; --paper:#fff; --wash:#eee; --shade:#d8d8d8; --dark:#333; }
      * { box-sizing:border-box; }
      body { margin:0; min-height:100vh; display:grid; place-items:start center; padding:18px; color:var(--ink); background:#f3f3f3; font-family:"Comic Sans MS","Trebuchet MS",Arial,sans-serif; }
      .phone { width:min(100%,390px); min-height:720px; background:var(--paper); border:3px solid var(--ink); box-shadow:4px 4px 0 rgba(0,0,0,.16); padding:10px; }
      .top { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; min-height:34px; }
      .tag,.button,.box { background:var(--paper); border:2px solid var(--ink); font-weight:800; }
      .tag { display:inline-grid; place-items:center; min-height:25px; padding:2px 8px; font-size:13px; transform:rotate(-1deg); }
      .tag.center { justify-self:center; transform:rotate(1deg); }
      .tag.right { justify-self:end; }
      .room-card { display:grid; gap:10px; margin-top:18px; padding:10px; border:3px solid var(--ink); }
      h1 { margin:0; text-align:center; font-size:20px; }
      .code { display:grid; grid-template-columns:90px 1fr; min-height:42px; border:2px solid var(--ink); }
      .code span,.code strong { display:grid; place-items:center; }
      .code strong { border-left:2px solid var(--ink); font-size:18px; }
      .players { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
      .slot { min-height:132px; display:grid; grid-template-rows:24px 1fr 24px; border:2px solid var(--ink); background:var(--paper); }
      .slot.wait { background:var(--shade); }
      .slot b,.slot small { display:grid; place-items:center; border-bottom:2px solid var(--ink); font-size:11px; }
      .slot small { border-top:2px solid var(--ink); border-bottom:0; }
      .avatar { justify-self:center; align-self:center; width:50px; height:50px; background:var(--ink); border-radius:50%; box-shadow:0 36px 0 -12px var(--ink); }
      .button { min-height:42px; font:inherit; font-size:14px; }
      .hint { text-align:center; font-size:12px; }
    </style>
  </head>
  <body>
    <main class="phone">
      <header class="top">
        <button class="tag" data-nav="01-welcome-create-join.html">Back</button>
        <span class="tag center" data-bind="room-code">R001</span>
        <span class="tag right">Share</span>
      </header>
      <section class="room-card">
        <h1>Waiting for creating room</h1>
        <div class="code"><span>Room Code</span><strong data-bind="room-code">R001</strong></div>
        <div class="players">
          <div class="slot"><b data-bind="player-one-name">Player 1</b><div class="avatar"></div><small>Ready</small></div>
          <div class="slot"><b>Player 2</b><div class="avatar"></div><small>Ready</small></div>
          <div class="slot wait"><b>Player 3</b><div class="avatar"></div><small>Waiting</small></div>
          <div class="slot wait"><b>Player 4</b><div class="avatar"></div><small>Waiting</small></div>
        </div>
        <button class="button" data-action="start-game">Start Game</button>
        <div class="hint">Minimum 2 kings. Maximum 4 kings.</div>
      </section>
    </main>
    <script>
      const frameState = {
        roomCode: "R001",
        playerName: "Player 1",
        readyPlayers: 2
      };

      const frameElements = {
        roomCodeLabels: document.querySelectorAll("[data-bind='room-code']"),
        playerOneName: document.querySelector("[data-bind='player-one-name']"),
        startButton: document.querySelector("[data-action='start-game']"),
        backButton: document.querySelector("[data-nav='01-welcome-create-join.html']")
      };

      function initializeFrame() {
        /*
          Production: RoomPage receives room/player state from server.
          This frame reads query params only to make prototype navigation feel continuous.
        */
        const params = new URLSearchParams(window.location.search);
        frameState.roomCode = params.get("room") || frameState.roomCode;
        frameState.playerName = params.get("player") || frameState.playerName;
        frameElements.startButton.addEventListener("click", handleStartGame);
        frameElements.backButton.addEventListener("click", () => navigateToFrame("01-welcome-create-join.html"));
        renderFrame();
      }

      function renderFrame() {
        frameElements.roomCodeLabels.forEach((item) => {
          item.textContent = frameState.roomCode;
        });
        frameElements.playerOneName.textContent = frameState.playerName;
        frameElements.startButton.disabled = frameState.readyPlayers < 2;
      }

      function handleStartGame() {
        /*
          Production action: host sends start-game request, server creates match, client navigates to game route.
        */
        if (frameElements.startButton.disabled) return;
        navigateToFrame("03-game-starting.html", { room: frameState.roomCode });
      }

      function navigateToFrame(fileName, params = {}) {
        const query = new URLSearchParams(params).toString();
        window.location.href = query ? `${fileName}?${query}` : fileName;
      }

      initializeFrame();
    </script>
  </body>
</html>
