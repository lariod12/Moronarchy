<!doctype html>
<!--
  DESIGN FRAME SPEC
  Frame: 02-room-lobby
  Screen purpose:
    Room lobby after Create or Join. Players wait together, see quick chat bubbles
    for active players, chat in the lobby log, and mark themselves ready before the match starts.

  Visual design:
    Black/white mobile wireframe based on the supplied lobby reference.
    Layout has a small room-code tab at the top, six player panels in a 2x3 grid,
    a full-width chat log above the bottom action buttons, and two equal action buttons.
    Tooltip annotation bubbles are not rendered.
    Typography uses a system UI font stack so Safari/iOS, Android, and Windows render reliably.

  Visible controls:
    Inputs: 1
      1. Chat message input - appears inside the Chat popup.
    Buttons: 5
      1. Chat/Cancel - opens local chat popup while not ready; cancels ready state while ready.
      2. Ready/Start - first click marks current player ready; second click advances prototype to countdown.
      3. Send - appends chat text to the bottom lobby log.
      4. Close - closes chat popup.
      5. Chat popup backdrop - closes chat popup when clicked outside the dialog.

  Interactive features:
    - Reads optional query params from frame 01: player, room, flow.
    - Player 1 card displays only "Player 1"; ownership is shown by the `player-card is-you`
      background treatment, not by visible "(You)" text.
    - Prototype assumes Player 1 is the host and Player 2 is the other active player.
      Player 2 is already ready in the mock state, so once Player 1 becomes ready the host can start.
    - Chat popup can append demo messages to the chat log.
    - Sending chat updates Player 1 speech bubble with the latest message preview.
    - Speech bubble preview is capped; long messages end with "...".
    - After sending chat, the speech bubble auto-hides after 3 seconds if no newer message is sent.
    - Ready button changes Player 1 speech bubble and becomes Start only when every active player is ready.
    - Start opens a centered countdown popup inside the lobby, then the prototype moves to the first board screen.
    - In this prototype, Player 1 is the default host and shows the approved dashed host border.
      Production should show this host border on the room creator's player card for every user.

  Button workflow:
    Chat -> open chat popup -> Send adds log line; Close/backdrop hides popup.
    Ready -> Player 1 becomes ready, bubble says "Ready!", Chat becomes Cancel, button becomes Start only if every active player is ready and current player is host.
    Cancel -> returns to not-ready state, writes cancel status to chat log, Cancel becomes Chat, Start/Waiting becomes Ready.
    Start -> open Game Starting countdown popup -> auto-count 3, 2, 1 -> 04-ingame-main-board-your-turn.html.

  Production mapping:
    Page/component target: apps/web RoomPage.
    Chat maps to lobby chat state or future websocket room messages.
    Ready maps to room readiness state; Start maps to host/server match start after server confirms every player is ready.
    The MVP rules still support 2-4 players; slots 5-6 are visual placeholders for future expansion.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>02 Room Lobby</title>
    <style>
      button, input {
        font: inherit;
      }

      button {
        color: var(--ink);
        appearance: none;
        -webkit-appearance: none;
        -webkit-text-fill-color: currentColor;
      }
:root {
        --ink: #050505;
        --paper: #ffffff;
        --wash: #eeeeee;
        --shade: #d8d8d8;
        --muted: #777777;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 16px;
        color: var(--ink);
        background: #f3f3f3;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        /*
          Cross-platform reset:
          iOS Safari can tint native button text blue unless color and appearance
          are explicitly controlled. Keep wireframe buttons black on every device.
        */
        color: var(--ink);
        appearance: none;
        -webkit-appearance: none;
        cursor: pointer;
        touch-action: manipulation;
      }

      input {
        touch-action: manipulation;
        user-select: text;
      }

      .phone {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 8px;
        width: min(100%, 390px);
        min-height: 620px;
        margin: 0 auto;
        padding: 8px 10px 10px;
        background: var(--paper);
        border: 3px solid var(--ink);
        box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.16);
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
      }

      /*
        Design decision:
        The lobby phone frame must not be draggable.
        Only explicit inner controls are interactive: chat-scroll, buttons, and chat input.
      */

      .room-code-tab {
        /*
          Design decision:
          Room code tab must stay fully visible inside the phone scene.
          Keep it in normal layout flow, not absolutely positioned, so viewport
          cropping or scene drag state cannot hide it.
        */
        position: relative;
        justify-self: center;
        display: grid;
        place-items: center;
        min-width: 48px;
        min-height: 28px;
        padding: 0 6px;
        background: var(--paper);
        border: 3px solid var(--ink);
        font-size: 13px;
        font-weight: 900;
        transform: rotate(1deg);
      }

      .lobby-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: minmax(92px, 1fr);
        gap: 8px 12px;
        min-height: 430px;
      }

      .player-card {
        position: relative;
        min-height: 92px;
        padding: 18px 8px 8px;
        background: var(--paper);
        border: 3px solid var(--ink);
      }

      .player-name-tab {
        position: absolute;
        top: -2px;
        left: 50%;
        z-index: 2;
        display: grid;
        place-items: center;
        min-width: 78px;
        min-height: 24px;
        padding: 0 6px;
        background: var(--paper);
        border: 3px solid var(--ink);
        font-size: 12px;
        font-weight: 900;
        transform: translateX(-50%) rotate(-1deg);
      }

      .player-avatar {
        position: absolute;
        left: 50%;
        bottom: 8px;
        width: 64px;
        height: 58px;
        overflow: hidden;
        transform: translateX(-50%);
      }

      .avatar-icon {
        position: absolute;
        inset: 0;
      }

      .avatar-head {
        position: absolute;
        left: 50%;
        bottom: 25px;
        width: 30px;
        aspect-ratio: 1 / 1;
        background: var(--ink);
        border-radius: 999px;
        transform: translateX(-50%);
      }

      .avatar-body {
        position: absolute;
        left: 50%;
        bottom: -4px;
        width: 60px;
        height: 26px;
        background: var(--ink);
        border-radius: 999px 999px 0 0;
        transform: translateX(-50%);
      }

      .speech-bubble {
        position: absolute;
        right: 20px;
        top: 34px;
        z-index: 3;
        display: grid;
        place-items: center;
        width: 84px;
        height: 28px;
        padding: 3px 8px;
        overflow: visible;
        background: var(--paper);
        border: 2px solid var(--ink);
        border-radius: 999px;
        font-size: 10px;
        font-weight: 800;
        line-height: 1.1;
        text-align: center;
      }

      .speech-bubble[hidden] {
        display: none;
      }

      .speech-text {
        display: block;
        max-width: 68px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /*
        Design decision:
        Speech bubble has a fixed size and fixed position.
        Text changes must not resize or move the bubble.
        Bubble tail must look connected to the bubble body.
        Do not use overflow:hidden on .speech-bubble because it clips the tail.
        Text overflow is clipped by .speech-text instead.
        Message length is also limited in JS by formatSpeechBubbleText().
        Tail shape below is user-approved from the design screenshot.
        Use a black tail layer and a white inner tail layer instead of a rotated
        square border, which made the tail look visually detached.
      */
      .speech-bubble::before {
        content: "";
        position: absolute;
        left: 13px;
        bottom: -14px;
        width: 15px;
        height: 13px;
        background: var(--ink);
        clip-path: polygon(20% 0, 88% 0, 27% 59%);
      }

      .speech-bubble::after {
        content: "";
        position: absolute;
        left: 15px;
        bottom: -6px;
        width: 12px;
        height: 9px;
        background: var(--paper);
        clip-path: polygon(0 0, 100% 0, 34% 100%);
      }

      /*
        Design decision:
        Current user is identified by the is-you background only.
        Do not add visible "(You)" text to the player name tab.
        Approved current-player background: #d0d0d0.
      */
      .player-card.is-you {
        background: #d0d0d0;
      }

      /*
        Design decision:
        Ready state must not change .player-name-tab background.
        The lobby uses the Ready/Start button state only.
        Player 1 is the default host in this prototype, so the dashed host border
        is visible immediately. This border means host/room creator, not
        "current user"; in production every user should see the same host
        player card with this border.
      */
      .player-card.is-host {
        outline: 3px dashed var(--ink);
        outline-offset: -8px;
      }

      .lobby-footer {
        display: grid;
        grid-template-rows: 112px 58px;
        gap: 8px;
        height: 178px;
      }

      .chat-log {
        position: relative;
        height: 112px;
        padding: 6px 18px 6px 6px;
        overflow: hidden;
        background: var(--paper);
        border: 3px solid var(--ink);
        font-size: 12px;
        font-weight: 800;
        line-height: 1.18;
      }

      /*
        Design decision:
        Chat log has a fixed height and auto-scrolls internally.
        New messages must not increase the lobby footer height.
      */
      .chat-scroll {
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 2px;
        scrollbar-width: none;
        overscroll-behavior: contain;
        touch-action: pan-y;
        user-select: text;
      }

      .chat-scroll::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      .chat-lines {
        display: grid;
        gap: 1px;
      }

      .scroll-rail {
        position: absolute;
        top: 3px;
        right: 3px;
        bottom: 3px;
        width: 11px;
        border-left: 2px solid var(--ink);
        background: var(--paper);
      }

      .scroll-rail::before,
      .scroll-rail::after {
        content: "";
        position: absolute;
        left: 2px;
        width: 7px;
        height: 7px;
        border: 2px solid var(--ink);
      }

      .scroll-rail::before {
        top: 1px;
      }

      .scroll-rail::after {
        bottom: 1px;
      }

      .scroll-thumb {
        position: absolute;
        top: 31px;
        right: 2px;
        width: 6px;
        height: 36px;
        background: var(--ink);
      }

      .footer-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .lobby-action {
        display: grid;
        place-items: center;
        min-width: 0;
        min-height: 58px;
        padding: 0;
        background: var(--paper);
        border: 3px solid var(--ink);
        font-size: 13px;
        font-weight: 900;
      }

      .lobby-action.is-primary {
        background: var(--wash);
      }

      .chat-modal[hidden] {
        display: none;
      }

      .chat-modal {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.38);
      }

      .chat-dialog {
        display: grid;
        gap: 8px;
        width: min(100%, 310px);
        padding: 12px;
        background: var(--paper);
        border: 3px solid var(--ink);
      }

      .chat-dialog strong {
        font-size: 17px;
      }

      .chat-input {
        min-height: 44px;
        padding: 6px 8px;
        border: 3px solid var(--ink);
        font-size: 16px;
        outline: 0;
        touch-action: manipulation;
        user-select: text;
      }

      .chat-dialog-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .chat-dialog-actions button, input { font: inherit; }

      button {
        min-height: 42px;
        background: var(--paper);
        border: 3px solid var(--ink);
        font-weight: 900;
      }

      .start-modal[hidden] {
        display: none;
      }

      .start-modal {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.38);
      }

      .start-dialog {
        display: grid;
        place-items: center;
        gap: 12px;
        width: min(100%, 280px);
        min-height: 160px;
        padding: 18px 14px;
        background: var(--paper);
        border: 3px solid var(--ink);
        text-align: center;
      }

      .start-dialog strong {
        font-size: 22px;
        font-weight: 900;
      }

      .start-countdown {
        font-size: 56px;
        line-height: 1;
        font-weight: 900;
      }

      @media (max-width: 430px) {
        body {
          padding: 0;
          background: var(--paper);
        }

        .phone {
          width: 100%;
          min-height: 100dvh;
          border-inline: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="phone screen-room-lobby" data-frame="room-lobby" data-ready-state="idle">
      <header class="room-code-tab" data-bind="room-code">R001</header>

      <!--
        Feature: six lobby player panels.
        Production: MVP can render only server-supported player slots; slots 5-6 are visual expansion placeholders.
      -->
      <section class="lobby-grid" aria-label="Room players">
        <article class="player-card is-you is-host" data-player-slot="1">
          <div class="player-name-tab" data-bind="player-one-name">Player 1</div>
          <div class="speech-bubble" data-bind="player-one-bubble-shell"><span class="speech-text" data-bind="player-one-bubble">Do something ..</span></div>
          <div class="player-avatar" aria-hidden="true">
            <div class="avatar-icon" aria-hidden="true">
              <div class="avatar-head"></div>
              <div class="avatar-body"></div>
            </div>
          </div>
        </article>

        <!--
          Design decision:
          Player 2 is the demo second active player and is already ready.
          This keeps the host-start flow testable: once Player 1 clicks Ready,
          the room is fully ready and Start becomes available.
        -->
        <article class="player-card" data-player-slot="2">
          <div class="player-name-tab">Player 2</div>
          <div class="speech-bubble"><span class="speech-text">Ready!</span></div>
          <div class="player-avatar" aria-hidden="true">
            <div class="avatar-icon" aria-hidden="true">
              <div class="avatar-head"></div>
              <div class="avatar-body"></div>
            </div>
          </div>
        </article>

        <article class="player-card" data-player-slot="3">
          <div class="player-name-tab">Player 3</div>
          <div class="player-avatar" aria-hidden="true">
            <div class="avatar-icon" aria-hidden="true">
              <div class="avatar-head"></div>
              <div class="avatar-body"></div>
            </div>
          </div>
        </article>

        <article class="player-card" data-player-slot="4">
          <div class="player-name-tab">Player 4</div>
          <div class="player-avatar" aria-hidden="true">
            <div class="avatar-icon" aria-hidden="true">
              <div class="avatar-head"></div>
              <div class="avatar-body"></div>
            </div>
          </div>
        </article>

        <article class="player-card" data-player-slot="5">
          <div class="player-name-tab">Player 5</div>
          <div class="player-avatar" aria-hidden="true">
            <div class="avatar-icon" aria-hidden="true">
              <div class="avatar-head"></div>
              <div class="avatar-body"></div>
            </div>
          </div>
        </article>

        <article class="player-card" data-player-slot="6">
          <div class="player-name-tab">Player 6</div>
          <div class="player-avatar" aria-hidden="true">
            <div class="avatar-icon" aria-hidden="true">
              <div class="avatar-head"></div>
              <div class="avatar-body"></div>
            </div>
          </div>
        </article>
      </section>

      <!--
        Feature: lobby chat/action footer.
        Production: chat log can be replaced by room messages; Ready maps to room readiness/start-match flow.
      -->
      <footer class="lobby-footer">
        <section class="chat-log" aria-label="Lobby chat log">
          <div class="chat-scroll" data-bind="chat-scroll">
            <div class="chat-lines" data-bind="chat-lines"></div>
          </div>
          <span class="scroll-rail" aria-hidden="true"><i class="scroll-thumb"></i></span>
        </section>
        <div class="footer-actions">
          <button class="lobby-action" data-action="chat-or-cancel">Chat</button>
          <button class="lobby-action is-primary" data-action="toggle-ready">Ready</button>
        </div>
      </footer>
    </main>

    <section class="chat-modal" data-modal="chat-modal" hidden>
      <form class="chat-dialog" data-action="send-chat-form">
        <strong>Lobby Chat</strong>
        <input
          class="chat-input"
          data-bind="chat-input"
          aria-label="Chat message"
          autocomplete="off"
          value="Do something .."
        />
        <div class="chat-dialog-actions">
          <button type="button" data-modal-close="chat-modal">Close</button>
          <button type="submit">Send</button>
        </div>
      </form>
    </section>

    <!--
      Design decision:
      Match start countdown happens in-place inside the lobby before route change.
      Only the host may trigger it, and only after all active players are ready.
    -->
    <section class="start-modal" data-modal="start-modal" hidden>
      <div class="start-dialog" aria-live="polite" aria-label="Game starting countdown">
        <strong>Game Starting</strong>
        <span class="start-countdown" data-bind="start-countdown">3</span>
      </div>
    </section>

    <script>
      const frameState = {
        roomCode: "R001",
        playerDisplayName: "Player 1",
        enteredName: "",
        isReady: false,
        currentPlayerSlot: 1,
        hostPlayerSlot: 1,
        activePlayerSlots: [1, 2],
        readyPlayerSlots: new Set([2]),
        latestPlayerMessage: "Do something ..",
        speechBubbleMaxLength: 22,
        speechBubbleAutoClearMs: 3000,
        speechBubbleClearTimerId: null,
        startCountdownSeconds: 3,
        startCountdownValue: 3,
        startCountdownTimerId: null,
        isStartCountdownOpen: false,
        chatLines: [
          "Player 1: Do something",
          "Player 1: don't leave me alone",
          "Player 2: stupid userr"
        ]
      };

      const frameElements = {
        root: document.querySelector("[data-frame='room-lobby']"),
        roomCode: document.querySelector("[data-bind='room-code']"),
        playerOneCard: document.querySelector("[data-player-slot='1']"),
        playerOneName: document.querySelector("[data-bind='player-one-name']"),
        playerOneBubbleShell: document.querySelector("[data-bind='player-one-bubble-shell']"),
        playerOneBubble: document.querySelector("[data-bind='player-one-bubble']"),
        chatScroll: document.querySelector("[data-bind='chat-scroll']"),
        chatLines: document.querySelector("[data-bind='chat-lines']"),
        chatInput: document.querySelector("[data-bind='chat-input']"),
        readyButton: document.querySelector("[data-action='toggle-ready']"),
        chatForm: document.querySelector("[data-action='send-chat-form']"),
        chatActionButton: document.querySelector("[data-action='chat-or-cancel']"),
        chatCloseButton: document.querySelector("[data-modal-close='chat-modal']"),
        chatModal: document.querySelector("[data-modal='chat-modal']"),
        startModal: document.querySelector("[data-modal='start-modal']"),
        startCountdown: document.querySelector("[data-bind='start-countdown']")
      };

      function initializeFrame() {
        /*
          Production: RoomPage receives room/player list from server.
          Prototype: query params keep continuity from 01-welcome-create-join.html.
        */
        const params = new URLSearchParams(window.location.search);
        frameState.roomCode = params.get("room") || frameState.roomCode;
        frameState.enteredName = params.get("player") || "";

        frameElements.readyButton.addEventListener("click", handleReadyAction);
        frameElements.chatActionButton.addEventListener("click", handleChatOrCancel);
        frameElements.chatCloseButton.addEventListener("click", () => closeModal("chat-modal"));
        frameElements.chatModal.addEventListener("click", handleChatBackdropClick);
        frameElements.chatForm.addEventListener("submit", handleSendChat);
        frameElements.root.addEventListener("wheel", preventPhoneDrag, { passive: false });
        frameElements.root.addEventListener("touchmove", preventPhoneDrag, { passive: false });

        renderFrame();
      }

      function preventPhoneDrag(event) {
        /*
          Design decision:
          Dragging the phone frame must not move the page or the whole lobby.
          Allow scrolling only inside the chat log and allow normal form/button gestures.
        */
        const allowedInteractiveRegion = event.target.closest(
          "[data-bind='chat-scroll'], .chat-dialog, button, input"
        );

        if (!allowedInteractiveRegion) {
          event.preventDefault();
        }
      }

      function renderFrame() {
        const allActivePlayersReady = areAllActivePlayersReady();
        const currentPlayerIsHost = frameState.currentPlayerSlot === frameState.hostPlayerSlot;
        const canHostStart = currentPlayerIsHost && allActivePlayersReady;

        frameElements.root.dataset.readyState = frameState.isReady ? "ready" : "idle";
        frameElements.roomCode.textContent = frameState.roomCode;
        frameElements.playerOneName.textContent = frameState.playerDisplayName;
        const speechBubbleText = frameState.isReady
          ? "Ready!"
          : formatSpeechBubbleText(frameState.latestPlayerMessage);
        frameElements.playerOneBubble.textContent = speechBubbleText;
        frameElements.playerOneBubbleShell.hidden = speechBubbleText.length === 0;
        frameElements.playerOneCard.classList.toggle("is-ready", frameState.isReady);
        frameElements.chatActionButton.textContent = frameState.isReady ? "Cancel" : "Chat";
        frameElements.chatActionButton.disabled = frameState.isStartCountdownOpen;
        frameElements.readyButton.textContent = frameState.isReady
          ? (canHostStart ? "Start" : "Waiting")
          : "Ready";
        frameElements.readyButton.disabled = frameState.isStartCountdownOpen || (frameState.isReady && !canHostStart);
        frameElements.startCountdown.textContent = String(frameState.startCountdownValue);
        frameElements.chatLines.innerHTML = frameState.chatLines.map((line) => `<span>${line}</span>`).join("");
        scrollChatLogToBottom();
      }

      function areAllActivePlayersReady() {
        return frameState.activePlayerSlots.every((slot) => frameState.readyPlayerSlots.has(slot));
      }

      function scrollChatLogToBottom() {
        /*
          Design decision:
          Chat log should auto-scroll to the newest message.
          The visual scrollbar is custom, while the real scroll container is .chat-scroll.
        */
        frameElements.chatScroll.scrollTop = frameElements.chatScroll.scrollHeight;
      }

      function handleChatOrCancel() {
        /*
          Design decision:
          While not ready, the left button opens chat.
          While ready, the same button becomes Cancel and cannot open chat.
          Cancel returns the player to not-ready state.
        */
        if (frameState.isReady) {
          handleCancelReady();
          return;
        }

        openModal("chat-modal");
      }

      function handleReadyAction() {
        /*
          Production action:
          - first state maps to ready-room/player-ready server state
          - only the host can start the match
          - start is allowed only after every active player is ready
        */
        if (frameState.isReady) {
          if (frameState.currentPlayerSlot !== frameState.hostPlayerSlot) {
            return;
          }

          if (!areAllActivePlayersReady()) {
            return;
          }

          openStartCountdown();
          return;
        }

        frameState.isReady = true;
        frameState.readyPlayerSlots.add(frameState.currentPlayerSlot);
        frameState.chatLines.push(`${frameState.playerDisplayName}: ready`);
        renderFrame();
      }

      function handleCancelReady() {
        /*
          Production action:
          - maps to a future room-ready cancel/unready event
          - restores chat access and changes Start back to Ready
        */
        frameState.isReady = false;
        frameState.readyPlayerSlots.delete(frameState.currentPlayerSlot);
        frameState.latestPlayerMessage = "";
        frameState.chatLines.push(`${frameState.playerDisplayName}: cancel ready`);

        if (frameState.speechBubbleClearTimerId) {
          window.clearTimeout(frameState.speechBubbleClearTimerId);
          frameState.speechBubbleClearTimerId = null;
        }

        renderFrame();
      }

      function openStartCountdown() {
        /*
          Design decision:
          Start does not leave the lobby immediately.
          The host sees an in-place "Game Starting" countdown modal first,
          then the route changes to the first board frame.
        */
        if (frameState.startCountdownTimerId) {
          window.clearInterval(frameState.startCountdownTimerId);
        }

        frameState.isStartCountdownOpen = true;
        frameState.startCountdownValue = frameState.startCountdownSeconds;
        frameElements.startModal.hidden = false;
        renderFrame();

        frameState.startCountdownTimerId = window.setInterval(() => {
          frameState.startCountdownValue -= 1;

          if (frameState.startCountdownValue <= 0) {
            window.clearInterval(frameState.startCountdownTimerId);
            frameState.startCountdownTimerId = null;
            frameState.isStartCountdownOpen = false;
            frameElements.startModal.hidden = true;
            navigateToFrame("04-ingame-main-board-your-turn.html", { room: frameState.roomCode });
            return;
          }

          renderFrame();
        }, 1000);
      }

      function handleSendChat(event) {
        /*
          Production action: send message to lobby websocket or room event stream.
        */
        event.preventDefault();
        const message = frameElements.chatInput.value.trim();
        if (!message) return;
        frameState.chatLines.push(`${frameState.playerDisplayName}: ${message}`);
        frameState.latestPlayerMessage = message;
        frameElements.chatInput.value = "";
        closeModal("chat-modal");
        scheduleSpeechBubbleAutoClear();
        renderFrame();
      }

      function scheduleSpeechBubbleAutoClear() {
        /*
          Design decision:
          A sent chat message appears above the player as a short speech preview,
          then the whole speech bubble hides after 3 seconds if no newer message is sent.
          New sends reset the timer, so only the latest message can clear itself.
        */
        if (frameState.speechBubbleClearTimerId) {
          window.clearTimeout(frameState.speechBubbleClearTimerId);
        }

        frameState.speechBubbleClearTimerId = window.setTimeout(() => {
          frameState.latestPlayerMessage = "";
          frameState.speechBubbleClearTimerId = null;
          renderFrame();
        }, frameState.speechBubbleAutoClearMs);
      }

      function formatSpeechBubbleText(message) {
        /*
          Design decision:
          Speech bubble shows only a short preview of the latest chat message.
          Chat log keeps the full message; bubble truncates with "..." to avoid overflow.
        */
        if (message.length <= frameState.speechBubbleMaxLength) {
          return message;
        }

        return `${message.slice(0, frameState.speechBubbleMaxLength).trim()}...`;
      }

      function handleChatBackdropClick(event) {
        if (event.target === frameElements.chatModal) {
          closeModal("chat-modal");
        }
      }

      function openModal(id) {
        document.querySelector(`[data-modal='${id}']`).hidden = false;
        if (id === "chat-modal") {
          frameElements.chatInput.focus();
        }
      }

      function closeModal(id) {
        document.querySelector(`[data-modal='${id}']`).hidden = true;
      }

      function navigateToFrame(fileName, params = {}) {
        const query = new URLSearchParams(params).toString();
        window.location.href = query ? `${fileName}?${query}` : fileName;
      }

      initializeFrame();
    </script>
  </body>
</html>
