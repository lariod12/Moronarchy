<!doctype html>
<!--
  DESIGN FRAME SPEC
  Frame: 12-game-over-result
  Screen purpose:
    Final match result screen after one king wins or the round limit resolves.

  Visual design:
    Mobile wireframe with top status bar, large winner crown block, ranking table,
    and one bottom return button. Keep visible UI black and white; source-image
    annotations should remain in comments only.

  Visible controls:
    Inputs: 0
    Buttons: 1
      1. Back to Lobby - returns to the room lobby for rematch or exit decisions.

  Interactive features:
    - Return button navigates back to the room lobby prototype.
    - Ranking is static sample data in this frame.

  Button workflow:
    Back to Lobby -> 02-room-lobby.html

  Production mapping:
    Page/component target: ResultPage or GameResultOverlay in apps/web.
    Server/core source: winnerId, defeated players, total value tiebreaker.
    Replace sample ranking with real final match state.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>12 Game Over Result</title>
    <style>
      :root { --ink:#050505; --paper:#fff; --wash:#eee; --shade:#d8d8d8; --dark:#333; }
      *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:start center;padding:18px;color:var(--ink);background:#f3f3f3;font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif}.phone{width:min(100%,390px);min-height:720px;background:var(--paper);border:3px solid var(--ink);box-shadow:4px 4px 0 rgba(0,0,0,.16);padding:10px;display:grid;grid-template-rows:auto auto 1fr auto;gap:10px}
      .top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;min-height:34px}.tag,.panel,.button{background:var(--paper);border:2px solid var(--ink);font-weight:800}.tag{display:inline-grid;place-items:center;min-height:25px;padding:2px 8px;font-size:13px;transform:rotate(-1deg)}.tag.center{justify-self:center;transform:rotate(1deg)}.tag.right{justify-self:end}
      .winner{display:grid;place-items:center;gap:8px;padding:18px;border:3px solid var(--ink);background:var(--wash);text-align:center}.crown{width:82px;height:56px;background:var(--ink);clip-path:polygon(0 100%,0 32%,20% 58%,35% 0,50% 54%,68% 0,83% 58%,100% 32%,100% 100%)}h1{margin:0;font-size:28px}.winner span{font-weight:800}
      .ranking{display:grid;border:3px solid var(--ink);align-self:start}.row{display:grid;grid-template-columns:34px 1fr 54px 54px 64px;min-height:44px;border-bottom:2px solid var(--ink);font-size:12px}.row:last-child{border-bottom:0}.row>*{display:grid;place-items:center;border-right:2px solid var(--ink)}.row>*:last-child{border-right:0}.head{background:var(--dark);color:var(--paper);font-weight:900}.first{background:var(--shade);font-weight:900}.button{min-height:42px;font:inherit}
    </style>
  </head>
  <body>
    <main class="phone">
      <header class="top"><span class="tag">Game Over</span><span class="tag center">R001</span><span class="tag right">Round 18</span></header>
      <section class="winner"><div class="crown"></div><h1>King Milo Wins</h1><span>Last surviving king</span></section>
      <section class="ranking">
        <div class="row head"><b>#</b><b>Name</b><b>Coin</b><b>Land</b><b>Value</b></div>
        <div class="row first"><b>1</b><b>King Milo</b><span>320</span><span>8</span><span>890</span></div>
        <div class="row"><b>2</b><b>King Rook</b><span>0</span><span>5</span><span>410</span></div>
        <div class="row"><b>3</b><b>Player 3</b><span>-</span><span>-</span><span>-</span></div>
        <div class="row"><b>4</b><b>Player 4</b><span>-</span><span>-</span><span>-</span></div>
      </section>
      <!-- Production: maps to result screen exit/rematch path. -->
      <button class="button" data-nav="02-room-lobby.html">Back to Lobby</button>
    </main>
    <script>
      function initializeFrame() {
        /*
          Prototype navigation:
          - keep this file standalone
          - use data-nav to show which production route this button represents
        */
        document.querySelector("[data-nav]").addEventListener("click", (event) => {
          navigateToFrame(event.currentTarget.dataset.nav);
        });
      }

      function navigateToFrame(fileName) {
        window.location.href = fileName;
      }

      initializeFrame();
    </script>
  </body>
</html>
