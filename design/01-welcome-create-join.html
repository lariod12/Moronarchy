<!doctype html>
<!--
  DESIGN FRAME SPEC
  Frame: 01-welcome-create-join
  Screen purpose:
    First multiplayer entry screen. Player chooses a king name, optionally enters a room code,
    then uses one primary button to create or join a room.

  Visual design:
    Black/white sketch wireframe based on the original Welcome KingDoom mockup.
    No visible annotation/callout text from source images is rendered in the UI.
    The player-facing screen contains title tab, preview card, two text inputs, and one centered primary button.

  Visible controls:
    Inputs: 2
      1. Name input - required for both create and join flows.
      2. Join room input - optional; when filled, it switches the primary button from Create to Join.
    Buttons: 1
      1. Primary flow button - centered; label is Create by default, Join when room code exists.

  Interactive features:
    - Typing Name updates the player preview label.
    - Typing Name enables the primary button as Create.
    - Typing Join room changes data-flow from create to join.
    - Typing Join room changes the same primary button label from Create to Join.
    - Clicking the primary button marks demo submission with Created or Joined text.

  Button workflow:
    Empty Name + empty Room: button disabled, label Create.
    Name filled + empty Room: button enabled, label Create, click maps to create-room.
    Name filled + Room filled: button enabled, label Join, click maps to join-room.

  Production mapping:
    Page/component target: apps/web HomePage create/join area.
    Create action: call lobby create API, then navigate to /room/:roomId.
    Join action: call lobby join API with room code, then navigate to /room/:roomId.
    Local demo state in this file must be replaced by real React state and server responses.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>01 Welcome Create Join</title>
    <style>
      :root {
        /* Design tokens: keep frame black/white until this flow is approved. */
        --ink: #050505;
        --paper: #ffffff;
        --wash: #eeeeee;
        --shade: #d8d8d8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        place-items: start center;
        min-height: 100vh;
        margin: 0;
        padding: 18px;
        color: var(--ink);
        background: #f3f3f3;
        font-family: "Comic Sans MS", "Trebuchet MS", Arial, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button:disabled {
        cursor: not-allowed;
      }

      /* Root mobile frame. Production equivalent: HomePage shell/phone container. */
      .phone {
        position: relative;
        width: min(100%, 390px);
        min-height: 596px;
        padding: 86px 12px 26px;
        background: var(--paper);
        border: 3px solid var(--ink);
        box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.16);
      }

      /* State styling: data-flow is controlled by renderFrame(). */
      .phone[data-flow="join"] .primary-flow-button:not(:disabled),
      .phone[data-flow="create"] .primary-flow-button:not(:disabled) {
        background: var(--shade);
        outline: 3px solid var(--ink);
        outline-offset: 2px;
      }

      .phone[data-can-submit="false"] .primary-flow-button {
        color: #777777;
        border-color: #777777;
      }

      /* Header title tab from the original wireframe. */
      .title-tab {
        position: absolute;
        top: -3px;
        left: 86px;
        right: 92px;
        display: grid;
        place-items: center;
        min-height: 36px;
        background: var(--paper);
        border: 3px solid var(--ink);
        border-top-width: 4px;
        border-radius: 0 0 4px 4px;
        font-size: 20px;
        font-weight: 900;
        line-height: 1;
        transform: rotate(0.5deg);
      }

      /* Player preview area. Production should bind this to the entered king name/avatar. */
      .profile-card {
        display: grid;
        grid-template-rows: 78px 1fr;
        min-height: 230px;
        border: 3px solid var(--ink);
      }

      .name-display {
        display: grid;
        place-items: center;
        margin: 6px;
        border: 3px solid var(--ink);
        font-size: 14px;
        font-weight: 800;
      }

      .portrait {
        display: grid;
        place-items: center;
      }

      .avatar {
        position: relative;
        width: 130px;
        height: 128px;
      }

      .avatar::before {
        content: "";
        position: absolute;
        top: 0;
        left: 38px;
        width: 58px;
        height: 72px;
        background: var(--ink);
        border-radius: 999px;
      }

      .avatar::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 52px;
        background: var(--ink);
        border-radius: 60px 60px 8px 8px;
      }

      /* Form grid: two inputs + one primary button. No second Join button. */
      .form-flow {
        position: relative;
        display: grid;
        grid-template-columns: 82px 1fr;
        gap: 8px 8px;
        width: 264px;
        margin: 16px auto 0;
      }

      .label-box,
      .input-box,
      /* Single action button. Text switches between Create and Join. */
      .primary-flow-button {
        min-height: 28px;
        background: var(--paper);
        border: 3px solid var(--ink);
        font-weight: 800;
      }

      .label-box {
        display: grid;
        place-items: center;
        font-size: 12px;
        transform: rotate(-1deg);
      }

      .input-box {
        width: 100%;
        padding: 2px 8px;
        outline: 0;
        font-size: 16px;
        transform: rotate(0.5deg);
      }

      .join-room-label {
        color: #777777;
        border-color: #777777;
        transform: rotate(-2deg);
      }

      .primary-flow-button {
        grid-column: 2;
        width: 150px;
        justify-self: center;
        min-height: 30px;
        margin-top: 18px;
        font-size: 13px;
        transform: rotate(-1deg);
      }

      @media (max-width: 430px) {
        body {
          padding: 0;
          background: var(--paper);
        }

        .phone {
          width: 100%;
          min-height: 100dvh;
          border-inline: 0;
          box-shadow: none;
        }

      }
    </style>
  </head>
  <body>
    <main
      class="phone screen-welcome-create-join"
      data-frame="welcome-create-join"
      data-flow="create"
      data-can-submit="false"
      aria-label="Welcome create join interactive wireframe"
    >
      <header class="title-tab frame-header">Welcome KingDoom</header>

      <!--
        Feature: player preview.
        Production: maps to HomePage player preview before creating/joining a room.
        Data binding: [data-bind="player-name-preview"] mirrors frameState.playerName.
      -->
      <section class="profile-card player-preview-card" aria-label="Player preview">
        <div class="name-display" data-bind="player-name-preview">Player Name</div>
        <div class="portrait">
          <div class="avatar"></div>
        </div>
      </section>

      <!--
        Feature: create/join room form.
        Production: maps to HomePage create-room and join-room controls.
        Contract:
          - Name input is required.
          - Room code input switches the same primary button from Create to Join.
          - There must be exactly one visible action button in this frame.
      -->
      <section class="form-flow frame-action-panel" aria-label="Create or join form">
        <label class="label-box" for="player-name">Name</label>
        <input
          id="player-name"
          class="input-box player-name-input"
          data-state-field="playerName"
          aria-label="Name"
          autocomplete="off"
        />

        <label class="label-box join-room-label" for="room-code">Join room</label>
        <input
          id="room-code"
          class="input-box room-code-input"
          data-state-field="roomCode"
          aria-label="Join room"
          autocomplete="off"
        />

        <button class="primary-flow-button" data-action="submit-room-flow" disabled>Create</button>
      </section>
    </main>

    <script>
      /*
        FRAME STATE
        This is fake local state for design testing only.
        Production should replace it with React state in HomePage and API results from the lobby server.
      */
      const frameState = {
        playerName: "",
        roomCode: "",
        createdRoomCode: "R001",
        lastAction: "idle",
        submittedFlow: null
      };

      /*
        ELEMENT MAP
        Keep selectors explicit so implementers can see which DOM part maps to which production concern.
      */
      const frameElements = {
        root: document.querySelector("[data-frame='welcome-create-join']"),
        playerNameInput: document.querySelector("[data-state-field='playerName']"),
        roomCodeInput: document.querySelector("[data-state-field='roomCode']"),
        playerNamePreview: document.querySelector("[data-bind='player-name-preview']"),
        primaryFlowButton: document.querySelector("[data-action='submit-room-flow']")
      };

      function initializeFrame() {
        /*
          Feature setup:
          - Input events update local demo state.
          - One primary button routes to create or join based on roomCode.
          Production: wire these inputs to HomePage local form state.
        */
        frameElements.playerNameInput.addEventListener("input", updateFrameState);
        frameElements.roomCodeInput.addEventListener("input", updateFrameState);
        frameElements.primaryFlowButton.addEventListener("click", handleSubmitRoomFlow);
        renderFrame();
      }

      function updateFrameState() {
        /*
          Workflow:
          - Normalize room code to uppercase.
          - Reset submittedFlow when user edits input.
          - Re-render button label/enabled state.
        */
        frameState.playerName = frameElements.playerNameInput.value.trim();
        frameState.roomCode = frameElements.roomCodeInput.value.trim().toUpperCase();
        frameState.submittedFlow = null;
        renderFrame();
      }

      function renderFrame() {
        /*
          Render rules:
          - No name: primary button disabled, label Create.
          - Name only: primary button enabled, label Create.
          - Name + room code: primary button enabled, label Join.
          - data-flow is the CSS hook for active visual state.
        */
        const hasName = frameState.playerName.length > 0;
        const hasRoomCode = frameState.roomCode.length > 0;
        const canCreateRoom = hasName && !hasRoomCode;
        const canJoinRoom = hasName && hasRoomCode;
        const activeFlow = hasRoomCode ? "join" : "create";
        const canSubmit = canCreateRoom || canJoinRoom;

        frameElements.root.dataset.flow = activeFlow;
        frameElements.root.dataset.canSubmit = String(canSubmit);
        frameElements.primaryFlowButton.disabled = !canSubmit;
        frameElements.playerNamePreview.textContent = hasName ? frameState.playerName : "Player Name";

        if (frameState.submittedFlow === "create") {
          frameElements.primaryFlowButton.textContent = "Created";
          return;
        }

        if (frameState.submittedFlow === "join") {
          frameElements.primaryFlowButton.textContent = "Joined";
          return;
        }

        frameElements.primaryFlowButton.textContent = activeFlow === "join" ? "Join" : "Create";
      }

      function handleSubmitRoomFlow() {
        /*
          One-button behavior:
          - If roomCode exists, submit as join-room.
          - Otherwise submit as create-room.
        */
        if (frameElements.primaryFlowButton.disabled) {
          return;
        }

        if (frameState.roomCode.length > 0) {
          handleJoinRoom();
          return;
        }

        handleCreateRoom();
      }

      function handleCreateRoom() {
        /*
          Production action:
          - call lobby create API
          - receive roomId/match setup
          - navigate to /room/:roomId
        */
        frameState.lastAction = "create-room";
        frameState.submittedFlow = "create";
        renderFrame();
      }

      function handleJoinRoom() {
        /*
          Production action:
          - validate room code
          - call lobby join API
          - navigate to /room/:roomId
        */
        frameState.lastAction = "join-room";
        frameState.submittedFlow = "join";
        renderFrame();
      }

      initializeFrame();
    </script>
  </body>
</html>
