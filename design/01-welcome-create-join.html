<!doctype html>
<!--
  DESIGN FRAME SPEC
  Frame: 01-welcome-create-join
  Status: Review

  Screen purpose:
    First multiplayer entry screen. Player chooses a king name, optionally enters a room code,
    then uses one primary button to create or join a room.

  Visual design:
    Black/white sketch wireframe based on the original Welcome KingDoom mockup.
    No visible annotation/callout text from source images is rendered in the UI.
    The player-facing screen contains title tab, preview card, two text inputs, and one centered primary button.
    The preview profile card owns about 70% of the available screen body; the form/action panel uses
    the remaining lower area so the mobile screen does not feel empty below the Create/Join action.
    The form group matches the source wireframe: two compact input rows, then one centered button
    aligned to the whole form block rather than only to the right-side input column.
    The scene container height is fixed; making inputs/buttons larger must never stretch the phone
    frame or make the whole scene draggable.
    On real mobile Safari/Zalo in-app browser, the title tab must sit below the notch/status bar
    and remain fully visible. Use an explicit mobile notch clearance because env(safe-area-inset-top)
    is not reliable in every in-app browser.
    The bottom border should hug the bottom of the visible scene on phones; use a fixed mobile
    scene container instead of relying on document height/scroll.

  Visible controls:
    Inputs: 2
      1. Name input - required for both create and join flows.
      2. Join room input - optional; when filled, it switches the primary button from Create to Join.
    Buttons: 1
      1. Primary flow button - centered; label is Create by default, Join when room code exists.

  Interactive features:
    - Typing Name updates the player preview label.
    - Typing Name enables the primary button as Create.
    - Typing Join room changes data-flow from create to join.
    - Typing Join room changes the same primary button label from Create to Join.
    - Clicking the primary button navigates to the room lobby frame.

  Button workflow:
    Empty Name + empty Room: button disabled, label Create.
    Name filled + empty Room: button enabled, label Create, click -> 02-room-lobby.html.
    Name filled + Room filled: button enabled, label Join, click -> 02-room-lobby.html.

  Production contract:
    - Preserve the preview-first mobile layout, live player-name preview, and single Create/Join action.
    - Empty trimmed Name keeps the action disabled; Room text switches the action from Create to Join.
    - Submitting a valid action enters the matching room lobby or displays a clear request error.

  Prototype simulations:
    - Frame navigation stands in for the real lobby create/join request and response.
    - Preview and form state are local to this HTML file.

  Prototype tooling:
    - None. All visible controls represent player-facing production behavior.

  Production mapping:
    Page/component target: apps/web HomePage create/join area.
    Create action: call lobby create API, then navigate to /room/:roomId.
    Join action: call lobby join API with room code, then navigate to /room/:roomId.
    Local demo state in this file must be replaced by real React state and server responses.

  Out of scope:
    - Lobby membership, chat, readiness, and game start behavior.

  Acceptance checklist:
    - Create and Join modes are visually distinguishable through the shared primary action.
    - Name preview and disabled state update immediately.
    - The frame remains usable at the intended mobile viewport.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>01 Welcome Create Join</title>
    <style>
      button, input {
        font: inherit;
      }

      button {
        color: var(--ink);
        appearance: none;
        -webkit-appearance: none;
        -webkit-text-fill-color: currentColor;
      }
:root {
        /* Design tokens: keep frame black/white until this flow is approved. */
        --ink: #050505;
        --paper: #ffffff;
        --wash: #eeeeee;
        --shade: #d8d8d8;
        --safe-top: env(safe-area-inset-top, 0px);
        --mobile-notch-clearance: max(44px, var(--safe-top));
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        display: grid;
        place-items: start center;
        height: 100vh;
        margin: 0;
        padding: 18px;
        overflow: hidden;
        overscroll-behavior: none;
        color: var(--ink);
        background: #f3f3f3;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button:disabled {
        cursor: not-allowed;
      }

      /* Root mobile frame. Production equivalent: HomePage shell/phone container. */
      .phone {
        position: relative;
        display: grid;
        grid-template-rows: minmax(330px, 7fr) minmax(154px, 3fr);
        align-content: stretch;
        gap: 18px;
        width: min(100%, 390px);
        height: 596px;
        padding: 86px 12px 26px;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-drag: none;
        background: var(--paper);
        border: 3px solid var(--ink);
        box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.16);
      }

      /* State styling: data-flow is controlled by renderFrame(). */
      .phone[data-flow="join"] .primary-flow-button:not(:disabled),
      .phone[data-flow="create"] .primary-flow-button:not(:disabled) {
        background: var(--shade);
        outline: 3px solid var(--ink);
        outline-offset: 2px;
      }

      .phone[data-can-submit="false"] .primary-flow-button {
        color: #777777;
        border-color: #777777;
      }

      /* Header title tab from the original wireframe. */
      .title-tab {
        position: absolute;
        top: -3px;
        left: 86px;
        right: 92px;
        display: grid;
        place-items: center;
        min-height: 36px;
        background: var(--paper);
        border: 3px solid var(--ink);
        border-top-width: 4px;
        border-radius: 0 0 4px 4px;
        font-size: 20px;
        font-weight: 900;
        line-height: 1;
        transform: rotate(0.5deg);
      }

      /*
        Player preview area.
        Design decision: this card should visually occupy about 70% of the screen body.
        Production should preserve the same weight so the welcome screen feels filled on tall phones.
      */
      .profile-card {
        display: grid;
        grid-template-rows: 78px 1fr;
        min-height: 0;
        height: 100%;
        border: 3px solid var(--ink);
      }

      .name-display {
        display: grid;
        place-items: center;
        margin: 6px;
        border: 3px solid var(--ink);
        font-size: 14px;
        font-weight: 800;
      }

      .portrait {
        display: grid;
        place-items: center;
      }

      .avatar {
        position: relative;
        width: 130px;
        height: 128px;
      }

      .avatar::before {
        content: "";
        position: absolute;
        top: 0;
        left: 38px;
        width: 58px;
        height: 72px;
        background: var(--ink);
        border-radius: 999px;
      }

      .avatar::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 52px;
        background: var(--ink);
        border-radius: 60px 60px 8px 8px;
      }

      /*
        Form grid: two inputs + one primary button. No second Join button.
        Design decision: this panel lives in the lower 30% area instead of floating mid-screen.
        Design decision: the primary button is centered under the full form group, matching the
        original wireframe red-box position.
      */
      .form-flow {
        position: relative;
        align-self: start;
        display: grid;
        grid-template-columns: 82px 1fr;
        gap: 10px 8px;
        width: 264px;
        margin: 0 auto;
      }

      .label-box,
      .input-box,
      /* Single action button. Text switches between Create and Join. */
      .primary-flow-button {
        min-height: 44px;
        background: var(--paper);
        border: 3px solid var(--ink);
        font-weight: 800;
      }

      .label-box {
        display: grid;
        place-items: center;
        font-size: 12px;
        transform: rotate(-1deg);
      }

      .input-box {
        width: 100%;
        padding: 8px 8px;
        outline: 0;
        font-size: 16px;
        transform: rotate(0.5deg);
        user-select: text;
      }

      .join-room-label {
        color: #777777;
        border-color: #777777;
        transform: rotate(-2deg);
      }

      .primary-flow-button {
        grid-column: 1 / -1;
        width: 174px;
        justify-self: center;
        min-height: 48px;
        margin-top: 20px;
        font-size: 15px;
        transform: rotate(-1deg);
      }

      @media (max-width: 430px) {
        body {
          padding: 0;
          background: var(--paper);
        }

        .phone {
          position: fixed;
          inset: 0;
          width: 100%;
          height: 100vh;
          height: 100svh;
          height: 100dvh;
          padding-top: calc(96px + var(--mobile-notch-clearance));
          border-inline: 0;
          box-shadow: none;
        }

        .title-tab {
          top: var(--mobile-notch-clearance);
        }

      }
    </style>
  </head>
  <body>
    <main
      class="phone screen-welcome-create-join"
      data-frame="welcome-create-join"
      data-flow="create"
      data-can-submit="false"
      aria-label="Welcome create join interactive wireframe"
    >
      <header class="title-tab frame-header">Welcome KingDoom</header>

      <!--
        Feature: player preview.
        Production: maps to HomePage player preview before creating/joining a room.
        Data binding: [data-bind="player-name-preview"] mirrors frameState.playerName.
      -->
      <section class="profile-card player-preview-card" aria-label="Player preview">
        <div class="name-display" data-bind="player-name-preview">Player Name</div>
        <div class="portrait">
          <div class="avatar"></div>
        </div>
      </section>

      <!--
        Feature: create/join room form.
        Production: maps to HomePage create-room and join-room controls.
        Contract:
          - Name input is required.
          - Room code input switches the same primary button from Create to Join.
          - There must be exactly one visible action button in this frame.
      -->
      <section class="form-flow frame-action-panel" aria-label="Create or join form">
        <label class="label-box" for="player-name">Name</label>
        <input
          id="player-name"
          class="input-box player-name-input"
          data-state-field="playerName"
          aria-label="Name"
          autocomplete="off"
        />

        <label class="label-box join-room-label" for="room-code">Join room</label>
        <input
          id="room-code"
          class="input-box room-code-input"
          data-state-field="roomCode"
          aria-label="Join room"
          autocomplete="off"
        />

        <button class="primary-flow-button" data-action="submit-room-flow" disabled>Create</button>
      </section>
    </main>

    <script>
      /*
        FRAME STATE
        This is fake local state for design testing only.
        Production should replace it with React state in HomePage and API results from the lobby server.
      */
      const frameState = {
        playerName: "",
        roomCode: "",
        createdRoomCode: "R001",
        lastAction: "idle"
      };

      /*
        ELEMENT MAP
        Keep selectors explicit so implementers can see which DOM part maps to which production concern.
      */
      const frameElements = {
        root: document.querySelector("[data-frame='welcome-create-join']"),
        playerNameInput: document.querySelector("[data-state-field='playerName']"),
        roomCodeInput: document.querySelector("[data-state-field='roomCode']"),
        playerNamePreview: document.querySelector("[data-bind='player-name-preview']"),
        primaryFlowButton: document.querySelector("[data-action='submit-room-flow']")
      };

      function initializeFrame() {
        /*
          Feature setup:
          - Input events update local demo state.
          - One primary button routes to create or join based on roomCode.
          Production: wire these inputs to HomePage local form state.
        */
        frameElements.playerNameInput.addEventListener("input", updateFrameState);
        frameElements.roomCodeInput.addEventListener("input", updateFrameState);
        frameElements.primaryFlowButton.addEventListener("click", handleSubmitRoomFlow);
        renderFrame();
      }

      function updateFrameState() {
        /*
          Workflow:
          - Normalize room code to uppercase.
          - Reset submittedFlow when user edits input.
          - Re-render button label/enabled state.
        */
        frameState.playerName = frameElements.playerNameInput.value.trim();
        frameState.roomCode = frameElements.roomCodeInput.value.trim().toUpperCase();
        renderFrame();
      }

      function renderFrame() {
        /*
          Render rules:
          - No name: primary button disabled, label Create.
          - Name only: primary button enabled, label Create.
          - Name + room code: primary button enabled, label Join.
          - data-flow is the CSS hook for active visual state.
        */
        const hasName = frameState.playerName.length > 0;
        const hasRoomCode = frameState.roomCode.length > 0;
        const canCreateRoom = hasName && !hasRoomCode;
        const canJoinRoom = hasName && hasRoomCode;
        const activeFlow = hasRoomCode ? "join" : "create";
        const canSubmit = canCreateRoom || canJoinRoom;

        frameElements.root.dataset.flow = activeFlow;
        frameElements.root.dataset.canSubmit = String(canSubmit);
        frameElements.primaryFlowButton.disabled = !canSubmit;
        frameElements.playerNamePreview.textContent = hasName ? frameState.playerName : "Player Name";

        frameElements.primaryFlowButton.textContent = activeFlow === "join" ? "Join" : "Create";
      }

      function handleSubmitRoomFlow() {
        /*
          One-button behavior:
          - If roomCode exists, submit as join-room.
          - Otherwise submit as create-room.
        */
        if (frameElements.primaryFlowButton.disabled) {
          return;
        }

        if (frameState.roomCode.length > 0) {
          handleJoinRoom();
          return;
        }

        handleCreateRoom();
      }

      function handleCreateRoom() {
        /*
        Production action:
        - call lobby create API
        - receive roomId/match setup
        - navigate to /room/:roomId
        */
        frameState.lastAction = "create-room";
        navigateToFrame("02-room-lobby.html", {
          flow: "create",
          player: frameState.playerName,
          room: frameState.createdRoomCode
        });
      }

      function handleJoinRoom() {
        /*
          Production action:
          - validate room code
          - call lobby join API
        - navigate to /room/:roomId
        */
        frameState.lastAction = "join-room";
        navigateToFrame("02-room-lobby.html", {
          flow: "join",
          player: frameState.playerName,
          room: frameState.roomCode
        });
      }

      function navigateToFrame(fileName, params = {}) {
        /*
          Prototype navigation:
          - design-only page transition using query string
          - production should use React Router navigation instead
        */
        const query = new URLSearchParams(params).toString();
        window.location.href = query ? `${fileName}?${query}` : fileName;
      }

      initializeFrame();
    </script>
  </body>
</html>
