<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>01 Welcome Create Join</title>
    <style>
      :root { --ink:#050505; --paper:#fff; --wash:#eee; --shade:#d8d8d8; --dark:#333; }
      * { box-sizing: border-box; }
      body { margin:0; min-height:100vh; display:grid; place-items:start center; padding:18px; color:var(--ink); background:#f3f3f3; font-family:"Comic Sans MS","Trebuchet MS",Arial,sans-serif; }
      .phone { width:min(100%,390px); min-height:720px; background:var(--paper); border:3px solid var(--ink); box-shadow:4px 4px 0 rgba(0,0,0,.16); padding:10px; }
      .top { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; min-height:34px; margin-bottom:10px; }
      .tag,.button,.box,.field { background:var(--paper); border:2px solid var(--ink); font-weight:800; }
      .tag { display:inline-grid; place-items:center; min-height:25px; padding:2px 8px; font-size:13px; transform:rotate(-1deg); }
      .tag.center { justify-self:center; transform:rotate(1deg); }
      .tag.right { justify-self:end; }
      .hero { display:grid; gap:10px; padding-top:26px; }
      h1 { margin:0; text-align:center; font-size:24px; line-height:1.05; }
      .portrait { display:grid; place-items:center; height:250px; border:3px solid var(--ink); }
      .avatar { position:relative; width:92px; height:120px; }
      .avatar:before { content:""; position:absolute; top:0; left:21px; width:50px; height:50px; background:var(--ink); border-radius:50%; }
      .avatar:after { content:""; position:absolute; bottom:0; left:0; width:92px; height:62px; background:var(--ink); border-radius:48px 48px 8px 8px; }
      .form { display:grid; gap:8px; margin-top:10px; }
      .field { display:grid; grid-template-columns:90px 1fr; align-items:center; min-height:38px; font-size:12px; }
      .field span { padding-left:8px; }
      .field input { width:100%; height:100%; border:0; border-left:2px solid var(--ink); padding:0 8px; font:inherit; font-size:16px; outline:0; }
      .row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
      .button { min-height:40px; font:inherit; font-size:13px; }
      .flow { display:grid; place-items:center; gap:4px; margin-top:14px; font-size:10px; }
      .flow .line { width:2px; height:18px; background:var(--ink); }
      .pill { border:2px solid var(--ink); padding:2px 8px; border-radius:999px; background:var(--paper); }
    </style>
  </head>
  <body>
    <main class="phone">
      <header class="top">
        <span class="tag">Welcome</span>
        <span class="tag center">Kingdom</span>
        <span class="tag right">v0</span>
      </header>
      <section class="hero">
        <h1>Welcome Kingdom</h1>
        <div class="portrait"><div class="avatar"></div></div>
        <div class="form">
          <label class="field"><span>Player Name</span><input value="King Milo" /></label>
          <div class="row">
            <button class="button">Create Room</button>
            <button class="button">Join Room</button>
          </div>
          <label class="field"><span>Room Code</span><input value="R001" /></label>
        </div>
        <div class="flow">
          <span class="pill">Enter name</span>
          <span class="line"></span>
          <span class="pill">Create or join multiplayer room</span>
        </div>
      </section>
    </main>
  </body>
</html>
