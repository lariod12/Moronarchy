<!doctype html>
<!--
  DESIGN FRAME SPEC
  Frame: 03-game-starting
  Screen purpose:
    Countdown popup over the reused room-lobby screen shown immediately after the host presses Start.
    Everything outside the popup is the existing lobby context, and this frame only covers the
    Game Starting countdown before navigation to the first board screen.

  Visual design:
    Black/white mobile wireframe matching the approved room lobby frame and target screenshot.
    Layout keeps the room-code tab, six player cards in a 2x3 grid, chat log, and bottom Cancel/Start buttons.
    A dim overlay sits above the reused lobby with a centered white countdown popup.
    Visible annotation text from source images is not copied into UI.
    Typography uses a cross-platform system UI stack; buttons keep the iOS color reset.

  Visible controls:
    Inputs: 0
    Buttons: 3
      1. Cancel - reused lobby control visible underneath the popup for continuity.
      2. Start - reused lobby control visible underneath the popup for continuity.
      3. Countdown popup - click to advance the popup countdown immediately without waiting for the timer.

  Interactive features:
    - Reads optional query params for room and countdown continuity.
    - Countdown popup is visible immediately on load over the reused lobby screen.
    - Default countdown starts at 3.
    - Auto-count runs 3 -> 2 -> 1 -> navigate to 05-main-board-your-turn.html.
    - Clicking the popup also advances the countdown so the frame is quick to test.
    - Lobby background stays visible but dimmed and non-interactive behind the popup.
    - Player 1 and Player 2 both show Ready bubbles; Player 1 keeps the host/current dashed card treatment.

  Button workflow:
    Initial state: countdown popup open over the ready-to-start lobby.
    Countdown popup click: decrement once; if value reaches 1, navigate to 05-main-board-your-turn.html.
    Auto countdown: after load, advance every 1 second until navigation.

  Production mapping:
    Page/component target: apps/web RoomPage start overlay transitioning into GamePage.
    Production should reuse real room state, player readiness, and server-authorized match start timing.
    Fake local countdown state in this frame should be replaced by real start-match transition state.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>03 Game Starting</title>
    <style>
      :root {
        --ink: #050505;
        --paper: #ffffff;
        --wash: #eeeeee;
        --shade: #d0d0d0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 16px;
        color: var(--ink);
        background: #f3f3f3;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        color: var(--ink);
        appearance: none;
        -webkit-appearance: none;
        -webkit-text-fill-color: currentColor;
        cursor: pointer;
        touch-action: manipulation;
      }

      .phone {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 8px;
        width: min(100%, 390px);
        min-height: 620px;
        margin: 0 auto;
        padding: 8px 10px 10px;
        overflow: hidden;
        background: var(--paper);
        border: 3px solid var(--ink);
        box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.16);
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
      }

      /*
        Design decision:
        The scene container is not draggable.
        Only the internal chat log remains scrollable.
      */

      .room-code-tab {
        position: relative;
        justify-self: center;
        display: grid;
        place-items: center;
        min-width: 48px;
        min-height: 28px;
        padding: 0 6px;
        background: var(--paper);
        border: 3px solid var(--ink);
        font-size: 13px;
        font-weight: 900;
        transform: rotate(1deg);
      }

      .lobby-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: minmax(92px, 1fr);
        gap: 8px 12px;
        min-height: 430px;
      }

      .player-card {
        position: relative;
        min-height: 92px;
        padding: 18px 8px 8px;
        background: var(--paper);
        border: 3px solid var(--ink);
      }

      .player-card.is-you {
        background: var(--shade);
      }

      .player-card.is-host {
        outline: 3px dashed var(--ink);
        outline-offset: -8px;
      }

      .player-name-tab {
        position: absolute;
        top: -2px;
        left: 50%;
        z-index: 2;
        display: grid;
        place-items: center;
        min-width: 78px;
        min-height: 24px;
        padding: 0 6px;
        background: var(--paper);
        border: 3px solid var(--ink);
        font-size: 12px;
        font-weight: 900;
        transform: translateX(-50%) rotate(-1deg);
      }

      .player-avatar {
        position: absolute;
        left: 50%;
        bottom: 8px;
        width: 64px;
        height: 58px;
        transform: translateX(-50%);
      }

      .player-avatar::before {
        content: "";
        position: absolute;
        top: 0;
        left: 21px;
        width: 31px;
        height: 36px;
        background: var(--ink);
        border-radius: 999px;
      }

      .player-avatar::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 27px;
        background: var(--ink);
        border-radius: 34px 34px 7px 7px;
      }

      .speech-bubble {
        position: absolute;
        right: 5px;
        top: 27px;
        z-index: 3;
        display: grid;
        place-items: center;
        width: 84px;
        height: 28px;
        padding: 3px 8px;
        overflow: visible;
        background: var(--paper);
        border: 2px solid var(--ink);
        border-radius: 999px;
        font-size: 10px;
        font-weight: 800;
        line-height: 1.1;
        text-align: center;
      }

      .speech-bubble::before {
        content: "";
        position: absolute;
        left: 13px;
        bottom: -14px;
        width: 15px;
        height: 13px;
        background: var(--ink);
        clip-path: polygon(20% 0, 88% 0, 27% 59%);
      }

      .speech-bubble::after {
        content: "";
        position: absolute;
        left: 15px;
        bottom: -6px;
        width: 12px;
        height: 9px;
        background: var(--paper);
        clip-path: polygon(0 0, 100% 0, 34% 100%);
      }

      .speech-text {
        display: block;
        max-width: 68px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .lobby-footer {
        display: grid;
        grid-template-rows: 112px 58px;
        gap: 8px;
        height: 178px;
      }

      .chat-log {
        position: relative;
        height: 112px;
        padding: 6px 18px 6px 6px;
        overflow: hidden;
        background: var(--paper);
        border: 3px solid var(--ink);
        font-size: 12px;
        font-weight: 800;
        line-height: 1.18;
      }

      .chat-scroll {
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 2px;
        scrollbar-width: none;
        overscroll-behavior: contain;
        touch-action: pan-y;
        user-select: text;
      }

      .chat-scroll::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      .chat-lines {
        display: grid;
        gap: 1px;
      }

      .scroll-rail {
        position: absolute;
        top: 3px;
        right: 3px;
        bottom: 3px;
        width: 11px;
        border-left: 2px solid var(--ink);
        background: var(--paper);
      }

      .scroll-rail::before,
      .scroll-rail::after {
        content: "";
        position: absolute;
        left: 2px;
        width: 7px;
        height: 7px;
        border: 2px solid var(--ink);
      }

      .scroll-rail::before {
        top: 1px;
      }

      .scroll-rail::after {
        bottom: 1px;
      }

      .scroll-thumb {
        position: absolute;
        top: 31px;
        right: 2px;
        width: 6px;
        height: 36px;
        background: var(--ink);
      }

      .footer-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .lobby-action {
        display: grid;
        place-items: center;
        min-width: 0;
        min-height: 58px;
        padding: 0;
        background: var(--paper);
        border: 3px solid var(--ink);
        font-size: 13px;
        font-weight: 900;
      }

      .lobby-action.is-primary {
        background: var(--wash);
      }

      .start-overlay {
        position: absolute;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.33);
      }

      .start-dialog {
        display: grid;
        place-items: center;
        gap: 24px;
        width: min(100%, 350px);
        min-height: 200px;
        padding: 28px 20px;
        background: var(--paper);
        border: 3px solid var(--ink);
        text-align: center;
      }

      .start-title {
        font-size: 26px;
        font-weight: 900;
        line-height: 1.1;
      }

      .start-countdown {
        font-size: 72px;
        line-height: 1;
        font-weight: 900;
      }

      @media (max-width: 430px) {
        body {
          padding: 0;
          background: var(--paper);
        }

        .phone {
          width: 100%;
          min-height: 100dvh;
          border-inline: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <!--
      Design decision:
      This frame intentionally reuses the lobby shell from 02 so it can be opened
      standalone and still explain the countdown popup overlay state to implementers.
    -->
    <main class="phone screen-game-starting" data-frame="game-starting">
      <header class="room-code-tab" data-bind="room-code">R001</header>

      <section class="lobby-grid" aria-label="Room players">
        <article class="player-card is-you is-host" data-player-slot="1">
          <div class="player-name-tab">Player 1</div>
          <div class="speech-bubble"><span class="speech-text">Ready!</span></div>
          <div class="player-avatar" aria-hidden="true"></div>
        </article>

        <article class="player-card" data-player-slot="2">
          <div class="player-name-tab">Player 2</div>
          <div class="speech-bubble"><span class="speech-text">Ready!</span></div>
          <div class="player-avatar" aria-hidden="true"></div>
        </article>

        <article class="player-card" data-player-slot="3">
          <div class="player-name-tab">Player 3</div>
        </article>

        <article class="player-card" data-player-slot="4">
          <div class="player-name-tab">Player 4</div>
        </article>

        <article class="player-card" data-player-slot="5">
          <div class="player-name-tab">Player 5</div>
          <div class="player-avatar" aria-hidden="true"></div>
        </article>

        <article class="player-card" data-player-slot="6">
          <div class="player-name-tab">Player 6</div>
          <div class="player-avatar" aria-hidden="true"></div>
        </article>
      </section>

      <footer class="lobby-footer">
        <section class="chat-log" aria-label="Lobby chat log">
          <div class="chat-scroll" data-bind="chat-scroll">
            <div class="chat-lines" data-bind="chat-lines"></div>
          </div>
          <span class="scroll-rail" aria-hidden="true"><i class="scroll-thumb"></i></span>
        </section>
        <div class="footer-actions" aria-hidden="true">
          <button class="lobby-action" type="button">Cancel</button>
          <button class="lobby-action is-primary" type="button">Start</button>
        </div>
      </footer>

      <!--
        Design decision:
        The countdown popup is visible immediately in this frame.
        Buttons remain visible behind it for layout continuity but are not meaningfully interactive.
      -->
      <section class="start-overlay" data-modal="start-modal" aria-label="Game starting countdown">
        <button class="start-dialog" type="button" data-action="advance-countdown" aria-live="polite">
          <span class="start-title">Game Starting</span>
          <span class="start-countdown" data-bind="start-countdown">3</span>
        </button>
      </section>
    </main>

    <script>
      const frameState = {
        roomCode: "R001",
        countdownValue: 3,
        countdownTimerId: null,
        chatLines: [
          "Player 1: Do something",
          "Player 1: don't leave me alone",
          "Player 2: stupid userr",
          "Player 1: ready"
        ]
      };

      const frameElements = {
        root: document.querySelector("[data-frame='game-starting']"),
        roomCode: document.querySelector("[data-bind='room-code']"),
        chatScroll: document.querySelector("[data-bind='chat-scroll']"),
        chatLines: document.querySelector("[data-bind='chat-lines']"),
        startCountdown: document.querySelector("[data-bind='start-countdown']"),
        countdownButton: document.querySelector("[data-action='advance-countdown']")
      };

      function initializeFrame() {
        /*
          Production: room code and countdown would come from real room/match state.
          Prototype: query params keep continuity and make countdown easy to test.
        */
        const params = new URLSearchParams(window.location.search);
        const countdownParam = Number(params.get("countdown"));

        frameState.roomCode = params.get("room") || frameState.roomCode;
        if (Number.isFinite(countdownParam) && countdownParam > 0) {
          frameState.countdownValue = Math.floor(countdownParam);
        }

        frameElements.root.addEventListener("wheel", preventPhoneDrag, { passive: false });
        frameElements.root.addEventListener("touchmove", preventPhoneDrag, { passive: false });
        frameElements.countdownButton.addEventListener("click", handleAdvanceCountdown);

        renderFrame();
        startAutoCountdown();
      }

      function preventPhoneDrag(event) {
        const allowedInteractiveRegion = event.target.closest(
          "[data-bind='chat-scroll'], [data-action='advance-countdown']"
        );

        if (!allowedInteractiveRegion) {
          event.preventDefault();
        }
      }

      function renderFrame() {
        frameElements.roomCode.textContent = frameState.roomCode;
        frameElements.startCountdown.textContent = String(frameState.countdownValue);
        frameElements.chatLines.innerHTML = frameState.chatLines.map((line) => `<span>${line}</span>`).join("");
        frameElements.chatScroll.scrollTop = frameElements.chatScroll.scrollHeight;
      }

      function startAutoCountdown() {
        if (frameState.countdownTimerId) {
          window.clearInterval(frameState.countdownTimerId);
        }

        frameState.countdownTimerId = window.setInterval(() => {
          advanceCountdown();
        }, 1000);
      }

      function handleAdvanceCountdown() {
        advanceCountdown();
      }

      function advanceCountdown() {
        if (frameState.countdownValue <= 1) {
          cleanupCountdownTimer();
          navigateToFrame("05-main-board-your-turn.html", { room: frameState.roomCode });
          return;
        }

        frameState.countdownValue -= 1;
        renderFrame();
      }

      function cleanupCountdownTimer() {
        if (frameState.countdownTimerId) {
          window.clearInterval(frameState.countdownTimerId);
          frameState.countdownTimerId = null;
        }
      }

      function navigateToFrame(fileName, params = {}) {
        const query = new URLSearchParams(params).toString();
        window.location.href = query ? `${fileName}?${query}` : fileName;
      }

      initializeFrame();
    </script>
  </body>
</html>
