<!doctype html>
<!--
  DESIGN FRAME SPEC
  Frame: 08-own-land-upgrade
  Screen purpose:
    Tile action after player lands on their own land. Player can upgrade or skip.

  Visual design:
    Board with target owned tile, center upgrade prompt, bottom action panel.

  Visible controls:
    Inputs: 0
    Buttons: 3
      1. Upgrade - opens upgraded result popup.
      2. Skip - navigates to 04-main-board-waiting-turn.html.
      3. Continue in popup - returns to waiting turn.

  Interactive features:
    - Upgrade shows local result modal.
    - Skip ends tile action.

  Button workflow:
    Upgrade -> upgraded popup -> Continue -> 04-main-board-waiting-turn.html
    Skip -> 04-main-board-waiting-turn.html

  Production mapping:
    Page/component target: ActionPanel own-land tile-action phase.
    Upgrade maps to boardgame.io move upgradeLand(); Skip maps to skipTileAction().
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>08 Own Land Upgrade</title>
    <style>
      button, input {
        font: inherit;
      }

      button {
        color: var(--ink);
        appearance: none;
        -webkit-appearance: none;
        -webkit-text-fill-color: currentColor;
      }
:root { --ink:#050505; --paper:#fff; --wash:#eee; --shade:#d8d8d8; --dark:#333; }
      *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:start center;padding:18px;color:var(--ink);background:#f3f3f3;font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif}.phone{width:min(100%,390px);background:var(--paper);border:3px solid var(--ink);box-shadow:4px 4px 0 rgba(0,0,0,.16);padding:10px}
      .top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;min-height:34px;margin-bottom:8px}.tag,.panel,.button{background:var(--paper);border:2px solid var(--ink);font-weight:800}.tag{display:inline-grid;place-items:center;min-height:25px;padding:2px 8px;font-size:13px;transform:rotate(-1deg)}.tag.center{justify-self:center;transform:rotate(1deg)}.tag.right{justify-self:end}
      .board{position:relative;display:grid;grid-template-columns:repeat(11,1fr);grid-template-rows:repeat(11,1fr);width:100%;aspect-ratio:1;gap:6px;padding:8px;border:3px solid var(--ink)}.tile{position:relative;display:grid;place-items:center;border:2px solid var(--ink);font-size:12px;font-weight:800}.tile.dim{background:var(--shade)}.tile.dark{background:var(--dark);color:var(--paper)}.tile.target{background:var(--shade);outline:4px double var(--ink);outline-offset:1px}.tile small{position:absolute;right:2px;bottom:1px;font-size:7px}.token{position:absolute;top:-5px;right:-5px;width:10px;height:10px;background:var(--ink);border:1px solid var(--paper);border-radius:50%}
      .center-stage{grid-column:3/10;grid-row:3/10;display:grid;place-items:center}.notice{display:grid;gap:6px;min-width:165px;padding:8px;border:2px solid var(--ink);background:var(--paper);text-align:center;transform:rotate(1deg);font-size:12px}.buildings{display:flex;justify-content:center;gap:4px}.house{width:18px;height:18px;background:var(--ink);clip-path:polygon(0 45%,50% 0,100% 45%,100% 100%,0 100%)}
      .hud{display:grid;grid-template-columns:112px 1fr;gap:5px;min-height:82px;margin-top:8px}.player-card{display:grid;grid-template-rows:22px 1fr}.player-name{display:grid;place-items:center;border-bottom:2px solid var(--ink);font-size:12px}.avatar{justify-self:center;align-self:center;width:42px;height:42px;background:var(--ink);border-radius:50%}.stats{display:grid;grid-template-rows:repeat(3,1fr)}.stat-row{display:grid;grid-template-columns:1fr 42px;align-items:center;border-bottom:2px solid var(--ink);font-size:12px}.stat-row:last-child{border-bottom:0}.stat-row span{padding-left:7px}.stat-row strong{display:grid;place-items:center;height:100%;border-left:2px solid var(--ink)}
      .action{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;margin-top:8px;padding:8px;border:3px solid var(--ink);background:var(--paper)}.action b{display:block}.action span{font-size:12px}.button{min-height:38px;padding:0 12px;font:inherit;font-size:13px}.button.primary{background:var(--shade)}.modal[hidden]{display:none}.modal{position:fixed;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.34)}.modal-card{display:grid;gap:8px;width:260px;padding:14px;background:var(--paper);border:3px solid var(--ink);text-align:center}.modal-card button{min-height:34px;background:var(--paper);border:2px solid var(--ink);font:inherit;font-weight:800}
    </style>
  </head>
  <body>
    <main class="phone">
      <header class="top"><span class="tag">Round 4</span><span class="tag center">R001</span><span class="tag right">Map</span></header>
      <section class="board" data-board><div class="center-stage"><div class="notice"><b>Your land</b><div class="buildings"><i class="house"></i><i class="house"></i></div><span>Upgrade to Level 3</span></div></div></section>
      <footer class="hud"><section class="panel player-card"><div class="player-name">Player Name</div><div class="avatar"></div></section><section class="panel stats"><div class="stat-row"><span>health:</span><strong>100</strong></div><div class="stat-row"><span>coin:</span><strong>180</strong></div><div class="stat-row"><span>level:</span><strong>3</strong></div></section></footer>
      <section class="action"><div><b>Upgrade Tile 12?</b><span>Cost 84 coin</span></div><button class="button primary" data-modal-open="upgrade-result-modal">Upgrade</button><button class="button" data-nav="04-main-board-waiting-turn.html">Skip</button></section>
      <section class="modal" data-modal="upgrade-result-modal" hidden><div class="modal-card"><strong>Land upgraded</strong><span>Tile 12 is now Level 3.</span><button data-nav="04-main-board-waiting-turn.html">Continue</button></div></section>
    </main>
    <script>
      const frameState = {
        targetTile: 12,
        currentLandLevel: 2,
        targetLandLevel: 3,
        ownedTiles: new Map([[5, "dim"], [8, "dim"], [12, "target"], [27, "dim"], [39, "dark"]]),
        tokenTiles: new Set([1, 12, 16, 31])
      };

      const frameElements = {
        board: document.querySelector("[data-board]"),
        upgradeButton: document.querySelector("[data-modal-open='upgrade-result-modal']"),
        navButtons: document.querySelectorAll("[data-nav]")
      };

      function initializeFrame() {
        /*
          Production:
          - Upgrade should call boardgame.io move upgradeLand()
          - server/core validates owner, coin, and king level >= target land level
        */
        renderBoard();
        frameElements.navButtons.forEach((item) => {
          item.addEventListener("click", () => navigateToFrame(item.dataset.nav));
        });
        frameElements.upgradeButton.addEventListener("click", handleUpgradeLand);
      }

      function renderBoard() {
        for (let id = 1; id <= 40; id += 1) {
          const position = getTileGridPosition(id);
          const tile = document.createElement("div");
          tile.className = `tile ${frameState.ownedTiles.get(id) ?? ""}`;
          tile.style.gridColumn = position.column;
          tile.style.gridRow = position.row;
          tile.innerHTML = `<span>${String(id).padStart(2, "0")}</span>${frameState.ownedTiles.has(id) ? `<small>L${frameState.currentLandLevel}</small>` : ""}${frameState.tokenTiles.has(id) ? '<i class="token"></i>' : ""}`;
          frameElements.board.appendChild(tile);
        }
      }

      function getTileGridPosition(id) {
        if (id === 1) return { column: 11, row: 1 };
        if (id >= 2 && id <= 10) return { column: 11, row: id };
        if (id === 11) return { column: 11, row: 11 };
        if (id >= 12 && id <= 21) return { column: 22 - id, row: 11 };
        if (id >= 22 && id <= 30) return { column: 1, row: 32 - id };
        return { column: id - 30, row: 1 };
      }

      function handleUpgradeLand() {
        openModal("upgrade-result-modal");
      }

      function navigateToFrame(fileName) {
        window.location.href = fileName;
      }

      function openModal(id) {
        document.querySelector(`[data-modal='${id}']`).hidden = false;
      }

      initializeFrame();
    </script>
  </body>
</html>
