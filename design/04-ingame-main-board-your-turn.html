<!doctype html>
<!--
  DESIGN FRAME SPEC
  Frame: 04-ingame-main-board-your-turn
  Screen purpose:
    In-game main board while another king is playing. The current player can inspect the map, status, and wait for the turn to advance.

  Visual design:
    Black/white hand-drawn mobile wireframe matching the in-game board reference:
    top tags, 40-tile perimeter board, dice callout in the empty center, and a bottom player HUD.

  Visible controls:
    Inputs: 0
    Buttons: 4
      1. Map - future map overview shortcut.
      2. Tap to Scroll - shakes the dice, randomizes pips, then reveals the speech result.
      3. Back - returns to 02-room-lobby.html.
      4. Crown button - opens a local status popup.

  Interactive features:
    - Tap to Scroll hides speech text, shakes the dice, randomizes pip faces, then reveals the final number.
    - Crown button opens/closes a player status modal.
    - Map button is visible as a future production control.

  Button workflow:
    Map -> local no-op for this frame.
    Tap to Scroll -> dice shake -> random pip changes -> final number appears in speech text.
    Back -> 02-room-lobby.html.
    Crown -> open status popup; Close -> hide popup.

  Production mapping:
    Page/component target: GamePage, BoardFrame, PlayerHud, and StatusMenu.
    Waiting state should come from boardgame.io currentPlayer, not local JS.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>04 In Game Main Board Your Turn</title>
    <style>
      :root {
        --ink: #050505;
        --paper: #ffffff;
        --wash: #f4f4f4;
        --shade: #cfcfcf;
        --stroke: 3px;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      button,
      input {
        font: inherit;
      }

      button {
        color: var(--ink);
        appearance: none;
        -webkit-appearance: none;
        -webkit-text-fill-color: currentColor;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: start center;
        padding: 10px;
        overflow: hidden;
        color: var(--ink);
        background: #f3f3f3;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        -webkit-touch-callout: none;
      }

      /* Root mobile frame. Production equivalent: GamePage shell. */
      .phone {
        position: relative;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 8px;
        width: min(100%, 430px);
        min-height: calc(100vh - 20px);
        margin: 0 auto;
        background: var(--paper);
        border: var(--stroke) solid var(--ink);
        box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.16);
        padding: 12px;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        -webkit-touch-callout: none;
      }

      .phone,
      .phone * {
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        -webkit-touch-callout: none;
      }

      .frame-top {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: start;
        min-height: 42px;
        margin-bottom: -1px;
      }

      .tag,
      .map-button,
      .tile,
      .panel,
      .tap-scroll,
      .modal-card button {
        background: var(--paper);
        border: var(--stroke) solid var(--ink);
        font-weight: 850;
        line-height: 1;
      }

      .tag,
      .map-button {
        width: max-content;
        min-height: 30px;
        padding: 5px 8px;
        font-size: 15px;
        transform: rotate(-1deg);
      }

      .tag {
        justify-self: start;
      }

      .tag.center {
        justify-self: center;
        transform: rotate(1deg);
      }

      .map-button {
        justify-self: end;
        min-width: 44px;
        cursor: pointer;
        transform: rotate(2deg);
      }

      .map-button:active,
      .tap-scroll:active {
        transform: translateY(1px);
      }

      /* Board perimeter: 40 Monopoly-style tiles wrapped around an empty play field. */
      .board {
        position: relative;
        display: grid;
        grid-template-columns: repeat(11, 1fr);
        grid-template-rows: repeat(11, 1fr);
        width: 100%;
        aspect-ratio: 1 / 1;
        height: auto;
        justify-self: stretch;
        align-self: center;
        min-height: 0;
        gap: 7px;
        padding: 8px;
        border: var(--stroke) solid var(--ink);
        background: var(--paper);
      }

      .tile {
        position: relative;
        display: grid;
        place-items: center;
        min-width: 0;
        min-height: 0;
        font-size: clamp(11px, 3.1vw, 15px);
        border-width: 2.5px;
        box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.2);
      }

      .tile.is-owned {
        background: #d0d0d0;
      }

      .tile.is-tilted-left {
        transform: rotate(-1.5deg);
      }

      .tile.is-tilted-right {
        transform: rotate(1.5deg);
      }

      .tile-marker {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 20px;
        height: 28px;
        transform: translate(-50%, -50%) scale(0.9);
        pointer-events: none;
        z-index: 1;
      }

      .tile-marker-part {
        position: absolute;
        background: var(--ink);
      }

      .tile-marker-head {
        left: 50%;
        top: 0px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        transform: translateX(-50%);
      }

      .tile-marker-body {
        left: 50%;
        top: 9px;
        width: 12px;
        height: 10px;
        border-radius: 999px 999px 5px 5px;
        transform: translateX(-50%);
        z-index: 2;
      }

      .tile-marker-arm {
        top: 10px;
        width: 4px;
        height: 12px;
        border-radius: 999px;
        transform-origin: 50% 2px;
        z-index: 1;
      }

      .tile-marker-arm-left {
        left: 4px;
        transform: rotate(36deg);
      }

      .tile-marker-arm-right {
        right: 4px;
        transform: rotate(-36deg);
      }

      .tile-marker-leg {
        top: 16px;
        width: 4px;
        height: 12px;
        border-radius: 999px;
        z-index: 1;
      }

      .tile-marker-leg-left {
        left: 5px;
      }

      .tile-marker-leg-right {
        right: 5px;
      }

      .board-center {
        grid-column: 3 / 10;
        grid-row: 3 / 10;
        position: relative;
        display: grid;
        place-items: center;
      }

      .dice-callout {
        position: relative;
        display: grid;
        justify-items: center;
        gap: 9px;
        margin-top: clamp(82px, 18dvh, 144px);
        transform: rotate(-1deg);
      }

      .speech-bubble {
        position: absolute;
        left: 53px;
        top: -34px;
        z-index: 3;
        width: 58px;
        height: 32px;
        display: grid;
        place-items: center;
        padding: 4px 11px;
        overflow: visible;
        background: var(--paper);
        border: 2px solid var(--ink);
        border-radius: 999px;
        font-size: 14px;
        font-weight: 900;
        line-height: 1.1;
        text-align: center;
        /* transform: rotate(-12deg); */
      }

      .speech-text {
        display: block;
        max-width: 38px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .speech-bubble[hidden] {
        display: none;
      }

      /*
        Design decision:
        This bubble reuses the approved speech bubble construction from 02-room-lobby.
        Tail uses a black outer layer and white inner layer so it stays connected
        to the bubble body. Do not switch back to a rotated border tail.
      */
      .speech-bubble::before {
        content: "";
        position: absolute;
        left: 6px;
        bottom: -14px;
        width: 18px;
        height: 15px;
        background: var(--ink);
        clip-path: polygon(20% 0, 96% 0, 27% 70%);
      }

      .speech-bubble::after {
        content: "";
        position: absolute;
        left: 9px;
        bottom: -6px;
        width: 14px;
        height: 10px;
        background: var(--paper);
        clip-path: polygon(0 0, 100% 0, 34% 100%);
      }

      .dice {
        width: 48px;
        height: 48px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 4px;
        padding: 7px;
        background: var(--ink);
        border: 2px solid var(--ink);
        border-radius: 4px;
      }

      .dice.is-shaking {
        animation: dice-shake 200ms ease-in-out infinite;
      }

      .pip {
        width: 7px;
        height: 7px;
        place-self: center;
        background: var(--paper);
        border-radius: 50%;
      }

      .pip--top-left {
        grid-column: 1;
        grid-row: 1;
      }

      .pip--top-right {
        grid-column: 3;
        grid-row: 1;
      }

      .pip--middle-left {
        grid-column: 1;
        grid-row: 2;
      }

      .pip--center {
        grid-column: 2;
        grid-row: 2;
      }

      .pip--middle-right {
        grid-column: 3;
        grid-row: 2;
      }

      .pip--bottom-left {
        grid-column: 1;
        grid-row: 3;
      }

      .pip--bottom-right {
        grid-column: 3;
        grid-row: 3;
      }

      @keyframes dice-shake {
        0% {
          transform: translate(0, 0) rotate(0deg);
        }

        20% {
          transform: translate(-3px, 1px) rotate(-6deg);
        }

        40% {
          transform: translate(3px, -1px) rotate(5deg);
        }

        60% {
          transform: translate(-2px, -1px) rotate(-4deg);
        }

        80% {
          transform: translate(2px, 1px) rotate(4deg);
        }

        100% {
          transform: translate(0, 0) rotate(0deg);
        }
      }

      .tap-scroll {
        min-width: 86px;
        min-height: 28px;
        padding: 5px 8px;
        cursor: pointer;
        font-size: 12px;
        transform: rotate(-1.5deg);
      }

      /* Bottom HUD: player identity, stats, back, and king menu. */
      .hud {
        display: grid;
        grid-template-columns: 1.45fr 0.8fr 1fr 1fr;
        gap: 6px;
        min-height: 88px;
        align-self: end;
      }

      .panel {
        min-width: 0;
        border-width: var(--stroke);
      }

      .player-card {
        position: relative;
        display: grid;
        grid-template-rows: 1fr;
        min-width: 0;
        overflow: visible;
        background: var(--paper);
        padding-top: 14px;
      }

      .player-name {
        position: absolute;
        left: 5px;
        top: 0px;
        z-index: 2;
        width: max-content;
        display: grid;
        place-items: center;
        min-height: 22px;
        padding: 1px 7px 2px;
        background: var(--paper);
        border: 2.5px solid var(--ink);
        box-shadow: 2px 2px 0 var(--ink);
        font-size: 12px;
        font-weight: 850;
        line-height: 1;
        white-space: nowrap;
        transform: rotate(-1deg);
      }

      .avatar {
        position: relative;
        display: block;
        overflow: hidden;
        min-height: 0;
        background: var(--paper);
      }

      .avatar-icon {
        position: absolute;
        inset: 0;
      }

      .avatar-head {
        position: absolute;
        left: 50%;
        bottom: 25px;
        width: 30px;
        aspect-ratio: 1 / 1;
        background: var(--ink);
        border-radius: 999px;
        transform: translateX(-50%);
      }

      .avatar-body {
        position: absolute;
        left: 50%;
        bottom: -4px;
        width: 60px;
        height: 26px;
        background: var(--ink);
        border-radius: 999px 999px 0 0;
        transform: translateX(-50%);
      }

      .stats {
        display: grid;
        align-content: stretch;
        gap: 3px;
        border: 0;
      }

      .stat-row {
        display: grid;
        align-items: center;
        min-height: 25px;
        padding: 2px 6px;
        background: var(--paper);
        border: 2.5px solid var(--ink);
        font-size: 12px;
        font-weight: 850;
        line-height: 1;
        white-space: nowrap;
      }

      .nav-button,
      .crown-button {
        min-width: 0;
        display: grid;
        place-items: center;
        min-height: 78px;
        padding: 0;
        border-width: 2.5px;
        box-shadow: 3px 3px 0 var(--ink);
        cursor: pointer;
        overflow: hidden;
        transition: transform 80ms ease, box-shadow 80ms ease;
      }

      .nav-button:active,
      .crown-button:active,
      .nav-button.is-pressed,
      .crown-button.is-pressed {
        transform: translate(3px, 3px);
        box-shadow: 0 0 0 var(--ink);
      }

      .back-disc {
        position: relative;
        width: 54px;
        height: 54px;
        display: block;
        background: var(--ink);
        border-radius: 50%;
      }

      .back-disc::before {
        content: "";
        position: absolute;
        left: 13px;
        top: 18px;
        width: 26px;
        height: 14px;
        background: var(--paper);
        clip-path: polygon(0 50%, 42% 0, 42% 28%, 100% 28%, 100% 72%, 42% 72%, 42% 100%);
      }

      .crown {
        position: relative;
        display: block;
        width: 58px;
        height: 45px;
      }

      .crown::before {
        content: "";
        position: absolute;
        left: 3px;
        right: 3px;
        bottom: 2px;
        height: 34px;
        background: var(--ink);
        clip-path: polygon(7% 100%, 0 28%, 30% 58%, 50% 0, 70% 58%, 100% 28%, 93% 100%);
        border-radius: 0 0 9px 9px;
      }

      .crown::after {
        content: "";
        position: absolute;
        left: 0;
        top: 12px;
        width: 12px;
        height: 12px;
        background: var(--ink);
        border-radius: 50%;
        box-shadow: 23px -11px 0 var(--ink), 46px 0 0 var(--ink);
      }

      .modal[hidden] {
        display: none;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.42);
      }

      .modal-card {
        display: grid;
        gap: 10px;
        width: min(100%, 280px);
        padding: 16px;
        background: var(--paper);
        border: var(--stroke) solid var(--ink);
        text-align: center;
      }

      .modal-card button {
        min-height: 42px;
        cursor: pointer;
      }

      @media (max-width: 430px) {
        body {
          padding: 0;
          background: var(--paper);
        }

        .phone {
          width: 100%;
          min-height: 100dvh;
          border-inline: 0;
          box-shadow: none;
          padding: 8px;
        }
      }

      @media (max-width: 380px) {
        .phone {
          padding: 8px;
        }

        .board {
          gap: 5px;
          padding: 6px;
        }

        .hud {
          grid-template-columns: 1.28fr 0.8fr 0.9fr 0.9fr;
          gap: 5px;
        }

        .tag,
        .map-button {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <main class="phone screen-ingame-main-board-your-turn" aria-label="In-game board your turn frame">
      <header class="frame-top">
        <span class="tag">Round 1</span>
        <span class="tag center">R001</span>
        <button class="map-button" type="button" data-action="open-map" aria-label="Open map overview">Map</button>
      </header>

      <section class="board" data-board aria-label="40 tile game board">
        <div class="board-center">
          <div class="dice-callout" aria-label="Dice result preview">
            <div class="speech-bubble" hidden aria-live="polite">
              <span class="speech-text" data-bind="roll-result">11</span>
            </div>
            <div class="dice" data-dice-face="5" aria-hidden="true">
              <span class="pip pip--top-left"></span>
              <span class="pip pip--top-right"></span>
              <span class="pip pip--center"></span>
              <span class="pip pip--bottom-left"></span>
              <span class="pip pip--bottom-right"></span>
            </div>
            <button class="tap-scroll" type="button" data-action="simulate-your-turn">Tap to Scroll</button>
          </div>
        </div>
      </section>

      <footer class="hud" aria-label="Player heads up display">
        <section class="panel player-card" aria-label="Current player">
          <div class="player-name">Player Name</div>
          <div class="avatar" aria-hidden="true">
            <div class="avatar-icon" aria-hidden="true">
              <div class="avatar-head"></div>
              <div class="avatar-body"></div>
            </div>
          </div>
        </section>

        <section class="stats" aria-label="Player stats">
          <div class="stat-row">health: 100</div>
          <div class="stat-row">coin: 100</div>
          <div class="stat-row">level: 1</div>
        </section>

        <button class="panel nav-button" type="button" data-nav="02-room-lobby.html" aria-label="Back to room lobby">
          <span class="back-disc" aria-hidden="true"></span>
        </button>

        <button class="panel crown-button" type="button" data-modal-open="king-status-modal" aria-label="Open king status">
          <span class="crown" aria-hidden="true"></span>
        </button>
      </footer>

      <section class="modal" data-modal="king-status-modal" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="king-status-title">
          <strong id="king-status-title">King Status</strong>
          <span>Health 100 / Coin 100 / Level 1</span>
          <button type="button" data-modal-close="king-status-modal">Close</button>
        </div>
      </section>
    </main>

    <script>
      const frameState = {
        ownedTiles: new Set([5, 8, 12, 27]),
        pawnTile: 4,
        isRolling: false,
        currentFace: 5
      };

      const frameElements = {
        board: document.querySelector("[data-board]"),
        mapButton: document.querySelector("[data-action='open-map']"),
        waitButton: document.querySelector("[data-action='simulate-your-turn']"),
        dice: document.querySelector("[data-dice-face]"),
        speechBubble: document.querySelector(".speech-bubble"),
        speechText: document.querySelector("[data-bind='roll-result']"),
        backButton: document.querySelector("[data-nav='02-room-lobby.html']"),
        openStatusButton: document.querySelector("[data-modal-open='king-status-modal']"),
        closeStatusButton: document.querySelector("[data-modal-close='king-status-modal']")
      };

      const diceFaces = {
        1: ["center"],
        2: ["top-left", "bottom-right"],
        3: ["top-left", "center", "bottom-right"],
        4: ["top-left", "top-right", "bottom-left", "bottom-right"],
        5: ["top-left", "top-right", "center", "bottom-left", "bottom-right"],
        6: ["top-left", "top-right", "middle-left", "middle-right", "bottom-left", "bottom-right"]
      };

      function initializeFrame() {
        /*
          Production:
          - waiting state comes from boardgame.io currentPlayer
          - Tap to Scroll is a prototype shortcut for frame review only
        */
        renderBoard();
        renderDiceFace(frameState.currentFace);
        hideSpeechResult();
        frameElements.mapButton.addEventListener("click", handleOpenMap);
        frameElements.waitButton.addEventListener("click", handleSimulateYourTurn);
        frameElements.backButton.addEventListener("click", () => navigateToFrame("02-room-lobby.html"));
        frameElements.openStatusButton.addEventListener("click", () => openModal("king-status-modal"));
        frameElements.closeStatusButton.addEventListener("click", () => closeModal("king-status-modal"));
        bindPressEffect(frameElements.backButton);
        bindPressEffect(frameElements.openStatusButton);
      }

      function bindPressEffect(button) {
        const press = () => button.classList.add("is-pressed");
        const release = () => button.classList.remove("is-pressed");

        button.addEventListener("pointerdown", press);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointerleave", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("touchstart", press, { passive: true });
        button.addEventListener("touchend", release);
        button.addEventListener("touchcancel", release);
        button.addEventListener("blur", release);
      }

      function renderBoard() {
        for (let id = 1; id <= 40; id += 1) {
          const position = getTileGridPosition(id);
          const tile = document.createElement("div");
          const tiltClass = id % 2 === 0 ? "is-tilted-right" : "is-tilted-left";
          tile.className = `tile ${tiltClass}${frameState.ownedTiles.has(id) ? " is-owned" : ""}`;
          tile.style.gridColumn = position.column;
          tile.style.gridRow = position.row;
          tile.setAttribute("aria-label", `Tile ${id}`);

          // Current player tile only shows the marker icon and intentionally hides its tile number.
          if (id === frameState.pawnTile) {
            const marker = document.createElement("span");
            marker.className = "tile-marker";
            marker.setAttribute("role", "img");
            marker.setAttribute("aria-label", "Current player marker");
            ["head", "body", "arm arm-left", "arm arm-right", "leg leg-left", "leg leg-right"].forEach((partName) => {
              const part = document.createElement("span");
              part.className = `tile-marker-part tile-marker-${partName.replaceAll(" ", " tile-marker-")}`;
              marker.appendChild(part);
            });
            tile.appendChild(marker);
          } else {
            tile.textContent = String(id).padStart(2, "0");
          }

          frameElements.board.appendChild(tile);
        }
      }

      function getTileGridPosition(id) {
        /*
          Production equivalent: tile-layout helper maps 40 Monopoly-style tiles
          onto an 11x11 perimeter grid.
        */
        if (id === 1) return { column: 11, row: 1 };
        if (id >= 2 && id <= 10) return { column: 11, row: id };
        if (id === 11) return { column: 11, row: 11 };
        if (id >= 12 && id <= 21) return { column: 22 - id, row: 11 };
        if (id >= 22 && id <= 30) return { column: 1, row: 32 - id };
        return { column: id - 30, row: 1 };
      }

      function handleOpenMap() {
        /*
          Production action:
          - open map overview panel
          - this frame keeps it as a no-op because the screenshot only defines the visible control
        */
      }

      function handleSimulateYourTurn() {
        if (frameState.isRolling) return;

        /*
          Prototype action:
          - hide the speech result while dice is moving
          - rapidly swap pip patterns to show random rolling
          - reveal the final number in the speech bubble after the shake stops
          Production should replace this with the real dice/move result.
        */
        frameState.isRolling = true;
        frameElements.waitButton.disabled = true;
        frameElements.waitButton.textContent = "Rolling...";
        hideSpeechResult();

        frameElements.dice.classList.remove("is-shaking");
        void frameElements.dice.offsetWidth;
        frameElements.dice.classList.add("is-shaking");

        let ticks = 0;
        const maxTicks = 14;
        const rollTimer = window.setInterval(() => {
          ticks += 1;
          renderDiceFace(getRandomDiceFace());

          if (ticks >= maxTicks) {
            window.clearInterval(rollTimer);
            const finalFace = getRandomDiceFace();
            frameState.currentFace = finalFace;
            renderDiceFace(finalFace);
            showSpeechResult(finalFace);
            frameElements.dice.classList.remove("is-shaking");
            frameElements.waitButton.disabled = false;
            frameElements.waitButton.textContent = "Tap to Scroll";
            frameState.isRolling = false;
          }
        }, 140);
      }

      function getRandomDiceFace() {
        return Math.floor(Math.random() * 6) + 1;
      }

      function renderDiceFace(face) {
        frameElements.dice.dataset.diceFace = String(face);
        frameElements.dice.replaceChildren(
          ...diceFaces[face].map((position) => {
            const pip = document.createElement("span");
            pip.className = `pip pip--${position}`;
            return pip;
          })
        );
      }

      function hideSpeechResult() {
        frameElements.speechBubble.hidden = true;
        frameElements.speechBubble.setAttribute("aria-hidden", "true");
      }

      function showSpeechResult(face) {
        frameElements.speechText.textContent = String(face);
        frameElements.speechBubble.hidden = false;
        frameElements.speechBubble.setAttribute("aria-hidden", "false");
      }

      function navigateToFrame(fileName) {
        window.location.href = fileName;
      }

      function openModal(id) {
        document.querySelector(`[data-modal='${id}']`).hidden = false;
      }

      function closeModal(id) {
        document.querySelector(`[data-modal='${id}']`).hidden = true;
      }

      initializeFrame();
    </script>
  </body>
</html>
